/* ── SAFE LOCALSTORAGE ───────────────────────────────────────────── */
function lsGet(key, fallback = null) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null || raw === undefined) return fallback;
    return JSON.parse(raw);
  } catch (_) {
    return fallback;
  }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (_) {}
}
function lsDel(key) {
  try { localStorage.removeItem(key); } catch (_) {}
}

/* ── SETTINGS HELPERS ─────────────────────────────────────────────── */
function loadSettings() {
  const saved = lsGet(K_SETTINGS, {});
  return { ...DEFAULTS, ...saved };
}
function saveSettings(s) {
  // Never persist password inside main settings blob
  const { password: _pw, ...rest } = s;
  lsSet(K_SETTINGS, rest);
  // Password stored separately
  if (_pw && _pw.trim()) lsSet(K_PW, _pw.trim());
}
function getCorrectPassword() {
  // Priority: saved pw override > default
  return lsGet(K_PW, null) || DEFAULTS.password;
}

/* ── HISTORY HELPERS ──────────────────────────────────────────────── */
const MAX_HISTORY = 500;
function loadHistory() { return lsGet(K_HISTORY, []); }
function appendHistory(concepts) {
  const prev = loadHistory();
  const toAdd = concepts.map(c => ({
    id:       c.id,
    title:    c.title   || "",
    hook:     c.hook    || "",
    angle:    c.angle   || "",
    platform: c.platform|| "",
    date:     todayStr(),
  }));
  const merged = [...toAdd, ...prev].slice(0, MAX_HISTORY);
  lsSet(K_HISTORY, merged);
}
function clearHistory() { lsDel(K_HISTORY); lsDel(K_DAILY); }

/* ── DATE HELPERS ─────────────────────────────────────────────────── */
function todayStr() { return new Date().toISOString().slice(0, 10); }
function niceDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric"
  });
}
function uid() { return Math.random().toString(36).slice(2, 9); }

/* ── GEMINI API ───────────────────────────────────────────────────── */
async function callGemini(systemPrompt, userPrompt, maxTokens = 8192) {
  const key = loadSettings().geminiApiKey;
  if (!key || !key.trim()) throw new Error("No Gemini API key. Add it in ⚙️ Settings → AI.");
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`;
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: "user", parts: [{ text: userPrompt }] }],
    generationConfig: { maxOutputTokens: maxTokens, temperature: 1.0 }
  };
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errTxt = await res.text().catch(() => "");
    throw new Error(`Gemini HTTP ${res.status}: ${errTxt.slice(0, 200)}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(`Gemini Error: ${data.error.message || JSON.stringify(data.error)}`);
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("Gemini returned empty response. Please try again.");
  return text;
}

/* ── ROBUST JSON ARRAY EXTRACTOR ──────────────────────────────────── */
// Extracts a JSON array from AI text that may have markdown fences or extra prose
function extractJSONArray(rawText) {
  if (!rawText || typeof rawText !== "string") throw new Error("Empty AI response.");
  // Strip markdown code fences
  let t = rawText
    .replace(/```json\s*/gi, "")
    .replace(/```\s*/g, "")
    .trim();

  // Find the outermost [ ... ]
  const start = t.indexOf("[");
  const end   = t.lastIndexOf("]");
  if (start === -1 || end === -1 || end <= start) {
    throw new Error("AI response did not contain a JSON array. Raw preview: " + t.slice(0, 120));
  }
  t = t.slice(start, end + 1);

  // Fix: replace raw control characters inside JSON strings (common Gemini issue)
  let out = "";
  let inString = false;
  let i = 0;
  while (i < t.length) {
    const ch = t[i];
    // Handle escape sequences
    if (inString && ch === "\\") {
      out += ch;
      i++;
      if (i < t.length) { out += t[i]; i++; }
      continue;
    }
    // Toggle string state on unescaped quotes
    if (ch === '"') {
      inString = !inString;
      out += ch;
      i++;
      continue;
    }
    // Inside a string: escape raw control characters
    if (inString) {
      const code = ch.charCodeAt(0);
      if (code < 0x20) {
        if      (code === 10) out += "\\n";
        else if (code === 13) out += "\\r";
        else if (code === 9)  out += "\\t";
        else                  out += " ";
      } else {
        out += ch;
      }
    } else {
      out += ch;
    }
    i++;
  }

  // Attempt parse
  try { return JSON.parse(out); } catch (_) {}
  try { return JSON.parse(t); }   catch (e) {
    throw new Error("JSON parse failed: " + e.message + " | Preview: " + t.slice(0, 150));
  }
}

/* ── COPY BUTTON ─────────────────────────────────────────────────── */
function CopyButton({ text, label = "Copy Script" }) {
  const [done, setDone] = useState(false);
  function handle() {
    if (!text) return;
    try {
      navigator.clipboard.writeText(text).then(() => {
        setDone(true);
        setTimeout(() => setDone(false), 2000);
      }).catch(() => {
        // Fallback for browsers that restrict clipboard API
        const el = document.createElement("textarea");
        el.value = text;
        el.style.position = "fixed";
        el.style.opacity = "0";
        document.body.appendChild(el);
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        setDone(true);
        setTimeout(() => setDone(false), 2000);
      });
    } catch (_) {}
  }
  return (
    <button onClick={handle} className="btn-ghost" style={{
      background: "#0b1020", border: "1px solid #1a2540",
      borderRadius: 7, padding: "7px 14px",
      color: done ? "#10b981" : "#94a3b8",
      fontSize: 11, fontWeight: 600, cursor: "pointer",
      display: "flex", alignItems: "center", gap: 5,
      transition: "all 0.15s",
    }}>
      {done ? "✓ Copied!" : `📋 ${label}`}
    </button>
  );
}

            fontSize: 11, color: "#374151", lineHeight: 1.65,
          }}>
            💡 <strong style={{ color: "#4b5563" }}>How to film:</strong>{" "}
            Copy script → Open Higgsfield → Choose avatar or upload photo → Paste script →
            Pick motion preset (Selfie / Happy / Outfit Check) → Generate UGC video.
          </div>
        </div>
      )}
    </div>
  );
});

/* ════════════════════════════════════════════════════════════════════
   GENERATOR PAGE
   ════════════════════════════════════════════════════════════════════ */
function GeneratorPage() {
  const [focus, setFocus]           = useState("");
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress]     = useState("");
  const [concepts, setConcepts]     = useState([]);
  const [toast, setToast]           = useState(null);
  const [hasKey, setHasKey]         = useState(false);

  // Toast helper — stable across renders
  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3800);
  }, []);

  // On mount: check API key, load today's cached concepts
  useEffect(() => {
    const s = loadSettings();
    setHasKey(Boolean(s.geminiApiKey && s.geminiApiKey.trim()));
    const daily = lsGet(K_DAILY, null);
    if (daily && daily.date === todayStr() && Array.isArray(daily.concepts) && daily.concepts.length > 0) {
      setConcepts(daily.concepts);
    }
  }, []);

  async function generate() {
    if (generating) return;
    const s = loadSettings();
    if (!s.geminiApiKey || !s.geminiApiKey.trim()) {
      showToast("Add your Gemini API key in ⚙️ Settings first.", "error");
      return;
    }

    setGenerating(true);
    setConcepts([]);
    setProgress("Reading brand context...");

    try {
      const history = loadHistory();
      const recentPrev = history.slice(0, 70);

      const prevList = recentPrev.length > 0
        ? recentPrev.map((h, i) =>
            `${i + 1}. [${h.platform}] "${h.title}" — Angle: ${h.angle} — Hook: "${h.hook}"`
          ).join("\n")
        : "None — this is the first generation!";

      setProgress("Generating 10 unique concepts...");

      const systemPrompt = buildBrandContext();

      const userPrompt = `Generate EXACTLY 10 unique short-form video concepts for TODAY.
Distribution: 5 Instagram Reels + 5 TikTok Videos (alternate between them).

${focus.trim() ? `TODAY'S BRIEF / FOCUS:\n${focus.trim()}\n` : "No specific brief — create diverse, evergreen content.\n"}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PREVIOUSLY USED CONCEPTS — DO NOT REPEAT:
(These have already been made. Choose completely fresh angles, hooks, titles, and ideas.)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${prevList}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ANGLE VARIETY RULES (each concept uses a different angle):
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Concept 1:  hot take
Concept 2:  personal story / confession
Concept 3:  myth-busting
Concept 4:  step-by-step how-to
Concept 5:  behind-the-scenes
Concept 6:  data / stats revelation
Concept 7:  POV storytelling
Concept 8:  before vs after
Concept 9:  nobody talks about this
Concept 10: trend reaction

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SCRIPT STRUCTURE REQUIREMENTS:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hook (0–3s):   ONE sentence max 10 words. Must demand attention. Curiosity gap or bold claim.
body (3–45s):  Natural speech. Include [visual cues in brackets]. Use specific numbers. Real scenarios.
cta  (45–60s): Soft, conversational. Never "like and subscribe." Ask a question or give a clear next step.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
OUTPUT FORMAT — Return ONLY a valid JSON array. No preamble, no markdown fences, no extra text.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[
  {
    "platform": "Instagram Reel",
    "title": "short internal title for this concept",
    "angle": "exact angle name from the list above",
    "pillar": "one of: Success Stories | Education | Platform Tips | Industry Insights | Social Proof",
    "hook": "the single spoken hook sentence for the first 3 seconds",
    "hookOnScreen": "3–5 word bold text overlay for the screen",
    "script": {
      "hook": "full 0–3s spoken script",
      "body": "full 3–45s script with [visual direction cues] throughout",
      "cta": "full 45–60s CTA script"
    },
    "visualStyle": "talking head | POV | walk-and-talk | text-on-screen | B-roll with VO",
    "audioSuggestion": "specific trending audio style or description",
    "hashtags": "10–14 relevant hashtags separated by spaces"
  }
]`;

      setProgress("Waiting for AI response...");
      const rawText = await callGemini(systemPrompt, userPrompt, 9000);

      setProgress("Parsing concepts...");
      const parsed = extractJSONArray(rawText);

      if (!Array.isArray(parsed) || parsed.length === 0) {
        throw new Error("AI returned an empty or invalid concept list. Please try again.");
      }

      // Normalise and assign IDs
      const finalConcepts = parsed.map((c, i) => ({
        id:              uid(),
        platform:        typeof c.platform === "string" && c.platform.includes("TikTok")
                           ? "TikTok Video"
                           : "Instagram Reel",
        title:           c.title          || `Concept ${i + 1}`,
        angle:           c.angle          || ANGLES[i % ANGLES.length],
        pillar:          c.pillar         || "",
        hook:            c.hook           || c.script?.hook || "",
        hookOnScreen:    c.hookOnScreen   || "",
        script: {
          hook: c.script?.hook || c.hook  || "",
          body: c.script?.body            || "",
          cta:  c.script?.cta             || "",
        },
        visualStyle:     c.visualStyle    || "talking head",
        audioSuggestion: c.audioSuggestion|| "",
        hashtags:        c.hashtags       || "",
        used:            false,
      }));

      // Ensure first 5 are IG, next 5 are TikTok regardless of what AI returned
      const igPlatform  = finalConcepts.filter(c => c.platform === "Instagram Reel");
      const ttPlatform  = finalConcepts.filter(c => c.platform === "TikTok Video");
      const allConcepts = [...igPlatform, ...ttPlatform];

      setConcepts(allConcepts);

      // Persist today's batch
      lsSet(K_DAILY, { date: todayStr(), concepts: allConcepts, focus: focus.trim() });

      // Add to history for future deduplication
      appendHistory(allConcepts);

      setHasKey(true);
      showToast(`${allConcepts.length} concepts generated successfully!`);

    } catch (err) {
      const msg = err?.message || String(err);
      showToast(msg.length > 100 ? msg.slice(0, 100) + "…" : msg, "error");
    } finally {
      setGenerating(false);
      setProgress("");
    }
  }

  function handleRemove(id) {
    setConcepts(prev => {
      const next = prev.filter(c => c.id !== id);
      // Update daily cache
      const daily = lsGet(K_DAILY, {});
      lsSet(K_DAILY, { ...daily, concepts: next });
      return next;
    });
  }

  const igConcepts = concepts.filter(c => c.platform === "Instagram Reel");
  const ttConcepts = concepts.filter(c => c.platform === "TikTok Video");
  const histCount  = loadHistory().length;
  const hasToday   = concepts.length > 0;

  return (
    <div style={{
      padding: 28, fontFamily: "'DM Sans', sans-serif",
      height: "100%", overflowY: "auto",
    }}>
      {toast && <Toast {...toast} />}

      {/* Header */}
      <div style={{ marginBottom: 24 }}>
        <h1 style={{
          fontSize: 22, fontWeight: 800, color: "#f1f5f9",
          letterSpacing: "-0.5px", marginBottom: 5,
          fontFamily: "'Bricolage Grotesque', sans-serif",
        }}>
          Daily Concept Generator
        </h1>
        <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>
          10 unique Instagram Reel + TikTok concepts per day, guaranteed no repeats.
          {histCount > 0 && (
            <span style={{ marginLeft: 8, color: "#8b5cf6", fontWeight: 600 }}>
              📚 {histCount} past concepts tracked for dedup
            </span>
          )}
        </p>
      </div>

      {/* No API key warning */}
      {!hasKey && (
        <div style={{
          background: "rgba(245,158,11,0.07)",
          border: "1px solid rgba(245,158,11,0.2)",
          borderRadius: 10, padding: "12px 16px", marginBottom: 20,
          display: "flex", alignItems: "center", gap: 10,
        }}>
          <span style={{ fontSize: 18 }}>⚠️</span>
          <div>
            <div style={{ fontSize: 13, color: "#fbbf24", fontWeight: 600, marginBottom: 2 }}>
              Gemini API key required
            </div>
            <div style={{ fontSize: 12, color: "#78350f" }}>
              Add your free API key in <strong>⚙️ Settings → AI</strong> to start generating.
              Get one at{" "}
              <a href="https://aistudio.google.com/apikey" target="_blank" style={{ color: "#fbbf24", textDecoration: "underline" }}>
                aistudio.google.com/apikey
              </a>
            </div>
          </div>
        </div>
      )}

      {/* Input panel */}
      <div style={{
        background: "#0a0d1c", border: "1px solid #0e1830",
        borderRadius: 14, padding: 22, marginBottom: 24,
      }}>
        <label style={{
          fontSize: 11, fontWeight: 600, color: "#374151",
          display: "block", marginBottom: 8,
          textTransform: "uppercase", letterSpacing: "0.7px",
        }}>
          Today's Focus / Brief <span style={{ color: "#1e2d4a", fontWeight: 400 }}>(optional)</span>
        </label>
        <textarea
          value={focus}
          onChange={e => setFocus(e.target.value)}
          rows={3}
          placeholder="e.g. 'Focus on career coaches this week. We just hit 1,000 consultants — use as social proof. New booking feature launched. Avoid financial advisor content for now.'"
          style={{
            width: "100%", background: "#060912",
            border: "1px solid #111827", borderRadius: 9,
            padding: "11px 14px", color: "#f1f5f9",
            fontSize: 13, resize: "vertical",
            lineHeight: 1.65, marginBottom: 18,
          }}
        />

        <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <button
            onClick={generate}
            disabled={generating}
            style={{
              background: generating
                ? "#111827"
                : "linear-gradient(135deg, #6366f1, #8b5cf6)",
              border: "none", borderRadius: 9,
              padding: "12px 28px",
              color: generating ? "#374151" : "white",
              fontSize: 13, fontWeight: 700,
              cursor: generating ? "not-allowed" : "pointer",
              display: "flex", alignItems: "center", gap: 9,
              boxShadow: generating ? "none" : "0 4px 18px rgba(99,102,241,.35)",
              transition: "all 0.2s",
            }}>
            {generating
              ? <><Spinner size={13} /> {progress || "Generating…"}</>
              : "⚡ Generate 10 Concepts"}
          </button>

          {hasToday && !generating && (
            <div style={{ fontSize: 12, color: "#374151", display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ color: "#10b981" }}>✓</span>
              {concepts.length} concepts ready ·
              <button
                onClick={generate}
                style={{
                  background: "none", border: "none",
                  color: "#6366f1", cursor: "pointer",
                  fontSize: 12, padding: "0 4px",
                  textDecoration: "underline", textDecorationStyle: "dotted",
                }}>
                Regenerate →
              </button>
            </div>
          )}
        </div>
      </div>

      {/* Concepts output */}
      {concepts.length > 0 && !generating && (
        <div>
          {/* Instagram Reels */}
          {igConcepts.length > 0 && (
            <div style={{ marginBottom: 32 }}>
              <SectionDivider
                icon="🎬" title="Instagram Reels"
                count={igConcepts.length} color="#e1306c"
              />
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {igConcepts.map((c, i) => (
                  <ConceptCard
                    key={c.id}
                    concept={c}
                    index={i}
                    onRemove={handleRemove}
                  />
                ))}
              </div>
            </div>
          )}

          {/* TikTok Videos */}
          {ttConcepts.length > 0 && (
            <div style={{ marginBottom: 32 }}>
              <SectionDivider
                icon="🎵" title="TikTok Videos"
                count={ttConcepts.length} color="#69c9d0"
              />
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {ttConcepts.map((c, i) => (
                  <ConceptCard
                    key={c.id}
                    concept={c}
                    index={i}
                    onRemove={handleRemove}
                  />
                ))}
              </div>
            </div>
          )}

          {/* Summary bar */}
          <div style={{
            background: "rgba(99,102,241,0.05)",
            border: "1px solid rgba(99,102,241,0.15)",
            borderRadius: 10, padding: "12px 18px",
            display: "flex", gap: 20, flexWrap: "wrap", alignItems: "center",
            fontSize: 12, marginBottom: 8,
          }}>
            <span style={{ color: "#6366f1", fontWeight: 700 }}>📊 Today's batch</span>
            <span style={{ color: "#94a3b8" }}>🎬 {igConcepts.length} Instagram Reels</span>
            <span style={{ color: "#94a3b8" }}>🎵 {ttConcepts.length} TikTok Videos</span>
            <span style={{ color: "#374151" }}>📚 {histCount} total concepts tracked</span>
          </div>
        </div>
      )}

      {/* Loading state */}
      {generating && (
        <div style={{
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          padding: "60px 20px", gap: 16,
        }}>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{
                width: 8, height: 8, borderRadius: "50%",
                background: "#6366f1",
                animation: `pulse 1.2s ease ${i * 0.2}s infinite`,
              }}/>
            ))}
          </div>
          <div style={{ fontSize: 13, color: "#4b5563", textAlign: "center" }}>
            {progress || "Generating…"}
          </div>
          <div style={{ fontSize: 11, color: "#1e2d4a", textAlign: "center", maxWidth: 300 }}>
            Gemini is creating 10 unique concepts with full UGC scripts, tailored to your brand.
          </div>
        </div>
      )}

      {/* Empty state */}
      {concepts.length === 0 && !generating && (
        <div style={{
          textAlign: "center", padding: "50px 20px",
          color: "#374151",
        }}>
          <div style={{ fontSize: 52, marginBottom: 18 }}>🎬</div>
          <div style={{ fontSize: 16, color: "#4b5563", fontWeight: 700, marginBottom: 8 }}>
            Ready to create today's content
          </div>
          <div style={{
            fontSize: 13, color: "#374151",
            maxWidth: 400, margin: "0 auto", lineHeight: 1.75,
          }}>
            Click "Generate 10 Concepts" to get 5 Instagram Reels + 5 TikTok scripts.
            Each batch is unique — your full history is tracked to guarantee no repeats, ever.
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   HISTORY PAGE
   ════════════════════════════════════════════════════════════════════ */
function HistoryPage() {
  const [history, setHistory] = useState([]);
  const [filter, setFilter]   = useState("All");
  const [search, setSearch]   = useState("");

  useEffect(() => {
    setHistory(loadHistory());
  }, []);

  function handleClear() {
    if (!window.confirm("Clear all history? This resets deduplication — concepts can be regenerated.")) return;
    clearHistory();
    setHistory([]);
  }

  // Group history by date
  const grouped = useMemo(() => {
    const map = {};
    history.forEach(h => {
      const d = h.date || "Unknown";
      if (!map[d]) map[d] = [];
      map[d].push(h);
    });
    return Object.entries(map).sort(([a], [b]) => b.localeCompare(a));
  }, [history]);

  // Filtered view
  const filteredGrouped = useMemo(() => {
    if (filter === "All" && !search.trim()) return grouped;
    const q = search.toLowerCase();
    return grouped
      .map(([date, items]) => [
        date,
        items.filter(h => {
          if (filter !== "All" && h.platform !== filter) return false;
          if (q && !h.title.toLowerCase().includes(q) && !h.hook.toLowerCase().includes(q) && !h.angle.toLowerCase().includes(q)) return false;
          return true;
        }),
      ])
      .filter(([, items]) => items.length > 0);
  }, [grouped, filter, search]);

  const totalFiltered = filteredGrouped.reduce((acc, [, items]) => acc + items.length, 0);

  return (
    <div style={{
      padding: 28, fontFamily: "'DM Sans', sans-serif",
      height: "100%", overflowY: "auto",
    }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-0.5px", marginBottom: 5, fontFamily: "'Bricolage Grotesque', sans-serif" }}>
            Concept History
          </h1>
          <p style={{ fontSize: 13, color: "#374151" }}>
            All generated concepts · {history.length} total · used for deduplication
          </p>
        </div>
        <button
          onClick={handleClear}
          style={{
            background: "rgba(239,68,68,0.07)",
            border: "1px solid rgba(239,68,68,0.2)",
            borderRadius: 8, padding: "8px 14px",
            color: "#f87171", fontSize: 12,
            cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0,
          }}>
          🗑 Clear History
        </button>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
        {["All", "Instagram Reel", "TikTok Video"].map(f => (
          <button
            key={f}
            onClick={() => setFilter(f)}
            style={{
              padding: "5px 14px", borderRadius: 20, cursor: "pointer",
              border: `1px solid ${filter === f ? "#6366f1" : "#111827"}`,
              background: filter === f ? "rgba(99,102,241,0.12)" : "transparent",
              color: filter === f ? "#818cf8" : "#374151",
              fontSize: 12,
            }}>
            {f === "All" ? "All" : f === "Instagram Reel" ? "🎬 Instagram" : "🎵 TikTok"}
          </button>
        ))}
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search title, hook, angle…"
          style={{
            flex: 1, minWidth: 160, maxWidth: 260,
            background: "#0a0d1c", border: "1px solid #111827",
            borderRadius: 8, padding: "6px 12px",
            color: "#f1f5f9", fontSize: 12,
          }}
        />
        <span style={{ fontSize: 12, color: "#374151" }}>{totalFiltered} concepts</span>
      </div>

      {/* History list */}
      {history.length === 0 ? (
        <div style={{ textAlign: "center", padding: 60, color: "#374151" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📭</div>
          No history yet. Generate some concepts first.
        </div>
      ) : filteredGrouped.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: "#374151" }}>
          No results match your filter.
        </div>
      ) : (
        filteredGrouped.map(([date, items]) => (
          <div key={date} style={{ marginBottom: 22 }}>
            {/* Date label */}
            <div style={{
              fontSize: 11, color: "#374151", fontWeight: 700,
              textTransform: "uppercase", letterSpacing: "0.8px",
              marginBottom: 8, paddingBottom: 6,
              borderBottom: "1px solid #0e1830",
              display: "flex", alignItems: "center", gap: 8,
            }}>
              {date === todayStr() && (
                <span style={{ color: "#10b981", background: "rgba(16,185,129,0.1)", padding: "1px 7px", borderRadius: 10 }}>Today</span>
              )}
              {niceDate(date)} · {items.length} concepts
            </div>

            {/* Items */}
            {items.map((h, i) => {
              const isIG  = h.platform === "Instagram Reel";
              const color = isIG ? "#e1306c" : "#69c9d0";
              return (
                <div
                  key={h.id || `${date}-${i}`}
                  style={{
                    display: "flex", gap: 10, alignItems: "flex-start",
                    padding: "10px 14px",
                    background: "#090d1b", border: "1px solid #0e1830",
                    borderRadius: 9, marginBottom: 5,
                    animation: `fadeUp 0.2s ease ${Math.min(i * 0.03, 0.3)}s both`,
                  }}>
                  <Badge color={color}>{isIG ? "🎬" : "🎵"} {h.platform}</Badge>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 500, marginBottom: 2 }}>
                      {h.title}
                    </div>
                    {h.hook && (
                      <div style={{ fontSize: 11, color: "#374151", fontStyle: "italic", fontFamily: "'DM Mono', monospace" }}>
                        "{h.hook.slice(0, 100)}{h.hook.length > 100 ? "…" : ""}"
                      </div>
                    )}
                  </div>
                  {h.angle && <Badge color="#1e2d4a" small>{h.angle}</Badge>}
                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

/* ── SETTINGS FIELD COMPONENTS (defined outside SettingsPage to prevent remount) ── */
// IMPORTANT: These MUST be defined outside SettingsPage.
// Defining components inside a parent component body causes React to treat them
// as a new type on every render → unmount/remount → input loses focus on every keystroke.
function SettingField({ label, value, onChange, placeholder, type = "text", mono = false, hint = null }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{
        fontSize: 11, color: "#374151", display: "block",
        marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.6px", fontWeight: 600,
      }}>
        {label}
      </label>
      <input
        type={type} value={value || ""}
        onChange={onChange}
        placeholder={placeholder}
        style={{
          width: "100%", background: "#060912",
          border: "1px solid #111827", borderRadius: 8,
          padding: "9px 12px", color: "#f1f5f9",
          fontSize: 13, fontFamily: mono ? "'DM Mono', monospace" : "inherit",
        }}
      />
      {hint && <div style={{ fontSize: 11, color: "#374151", marginTop: 4 }}>{hint}</div>}
    </div>
  );
}

function SettingTextArea({ label, value, onChange, placeholder, rows = 3 }) {

      <label style={{
        fontSize: 11, color: "#374151", display: "block",

/* ════════════════════════════════════════════════════════════════════
   SETTINGS PAGE
   ════════════════════════════════════════════════════════════════════ */
function SettingsPage() {
  const [s, setS]               = useState(() => loadSettings());
  const [tab, setTab]           = useState("ai");
  const [saved, setSaved]       = useState(false);
  const [testing, setTesting]   = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [showKey, setShowKey]   = useState(false);
  const [showPw, setShowPw]     = useState(false);

  function update(k, v) {
    setS(prev => ({ ...prev, [k]: v }));
    setSaved(false);
    setTestResult(null);
  }

  // Convenience wrappers for SettingField / SettingTextArea
  function F(k, label, placeholder, type = "text", mono = false, hint = null) {
    return (
      <SettingField
        label={label} placeholder={placeholder} type={type} mono={mono} hint={hint}
        value={s[k] || ""} onChange={e => update(k, e.target.value)}
      />
    );
  }
  function TA(k, label, placeholder, rows = 3) {
    return (
      <SettingTextArea
        label={label} placeholder={placeholder} rows={rows}
        value={s[k] || ""} onChange={e => update(k, e.target.value)}
      />
    );
  }

  function save() {
    saveSettings(s);
    setSaved(true);
    setTimeout(() => setSaved(false), 2800);
  }

  async function testKey() {
    if (!s.geminiApiKey || !s.geminiApiKey.trim()) {
      setTestResult({ ok: false, msg: "Enter your API key first." });
      return;
    }
    setTesting(true);
    setTestResult(null);
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${s.geminiApiKey.trim()}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: "Reply with only the word: OK" }] }],
          generationConfig: { maxOutputTokens: 5 }
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
      setTestResult({ ok: true, msg: `✓ Connected! Response: "${reply}"` });
    } catch (e) {
      setTestResult({ ok: false, msg: "✗ " + (e.message || "Connection failed") });
    }
    setTesting(false);
  }

  function handleReset() {
    if (!window.confirm("Reset all settings to defaults? This cannot be undone.")) return;
    lsDel(K_SETTINGS);
    lsDel(K_PW);
    setS({ ...DEFAULTS });
    setSaved(false);
  }

  const TABS = [
    { id: "ai",      label: "🤖 AI" },
    { id: "product", label: "📦 Product" },
    { id: "brand",   label: "🎨 Brand" },
    { id: "access",  label: "🔐 Access" },
  ];

  return (
    <div style={{
      padding: 28, fontFamily: "'DM Sans', sans-serif",
      height: "100%", overflowY: "auto",
    }}>
      <div style={{ marginBottom: 22 }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-0.5px", marginBottom: 5, fontFamily: "'Bricolage Grotesque', sans-serif" }}>
          Settings
        </h1>
        <p style={{ fontSize: 13, color: "#374151" }}>
          Configure AI, product context, brand voice, and access.
        </p>
      </div>

      {/* Tab row */}
      <div style={{
        display: "flex", gap: 4, marginBottom: 20,
        borderBottom: "1px solid #0e1830",
      }}>
        {TABS.map(t => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              padding: "8px 18px",
              borderRadius: "8px 8px 0 0",
              border: "none", cursor: "pointer",
              background: tab === t.id ? "#0a0d1c" : "transparent",
              color: tab === t.id ? "#f1f5f9" : "#374151",
              fontSize: 12, fontWeight: tab === t.id ? 600 : 400,
              borderBottom: tab === t.id ? "2px solid #6366f1" : "2px solid transparent",
              marginBottom: -1,
              transition: "all 0.15s",
            }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content card */}
      <div style={{
        background: "#0a0d1c", border: "1px solid #0e1830",
        borderRadius: 14, padding: 24, marginBottom: 20,
      }}>

        {/* ── AI TAB ── */}
        {tab === "ai" && (
          <div>
            <div style={{
              fontSize: 12, color: "#374151", marginBottom: 18, lineHeight: 1.7,
              padding: "10px 14px", background: "rgba(99,102,241,0.05)",
              border: "1px solid rgba(99,102,241,0.15)", borderRadius: 8,
            }}>
              🤖 Get a free API key at{" "}
              <a href="https://aistudio.google.com/apikey" target="_blank" style={{ color: "#8b5cf6", textDecoration: "underline" }}>
                aistudio.google.com/apikey
              </a>
              {" "}· Model used: <strong style={{ color: "#6366f1" }}>gemini-2.5-flash</strong>
            </div>

            <label style={{ fontSize: 11, color: "#374151", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.6px", fontWeight: 600 }}>
              Gemini API Key
            </label>
            <div style={{ position: "relative", marginBottom: 12 }}>
              <input
                type={showKey ? "text" : "password"}
                value={s.geminiApiKey || ""}
                onChange={e => update("geminiApiKey", e.target.value)}
                placeholder="AIza..."
                style={{
                  width: "100%", background: "#060912",
                  border: "1px solid #111827", borderRadius: 8,
                  padding: "9px 42px 9px 12px",
                  color: "#f1f5f9", fontSize: 13,
                  fontFamily: "'DM Mono', monospace",
                }}
              />
              <button
                onClick={() => setShowKey(v => !v)}
                style={{
                  position: "absolute", right: 10, top: "50%",
                  transform: "translateY(-50%)",
                  background: "none", border: "none",
                  color: "#374151", cursor: "pointer", fontSize: 14,
                }}>
                {showKey ? "🙈" : "👁"}
              </button>
            </div>

            <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              <button
                onClick={testKey}
                disabled={testing || !s.geminiApiKey}
                style={{
                  background: "#0b1020", border: "1px solid #1a2540",
                  borderRadius: 7, padding: "7px 16px",
                  color: s.geminiApiKey ? "#94a3b8" : "#374151",
                  fontSize: 12, cursor: s.geminiApiKey ? "pointer" : "not-allowed",
                  display: "flex", alignItems: "center", gap: 6,
                }}>
                {testing ? <><Spinner size={12} /> Testing…</> : "Test Connection"}
              </button>
              {testResult && (
                <span style={{
                  fontSize: 12,
                  color: testResult.ok ? "#10b981" : "#ef4444",
                  fontWeight: 600,
                }}>
                  {testResult.msg}
                </span>
              )}
            </div>
          </div>
        )}

        {/* ── PRODUCT TAB ── */}
        {tab === "product" && (
          <div>
            {F("productName",      "Product Name",           "Flashcall.me")}
            {F("productTagline",   "Tagline",                "Link-in-bio for consultants")}
            {F("websiteUrl",       "Website URL",            "flashcall.me", "text", true)}
            {TA("productDesc",     "Product Description",    "What does your product do?", 3)}
            {TA("productGoal",     "Marketing Goal",         "What action do you want users to take?", 2)}
            {TA("productAdvantage","Unfair Advantage / USP", "What makes you unique?", 2)}
            {TA("targetAudience",  "Target Audience",        "Career coaches, financial advisors…", 2)}
          </div>
        )}

        {/* ── BRAND TAB ── */}
        {tab === "brand" && (
          <div>
            {TA("brandVoice",      "Brand Voice",     "Empowering, direct, credible, warm…", 3)}
            {F("wordsToUse",       "Words to USE",    "earn, monetize, instantly…")}
            {F("wordsToAvoid",     "Words to AVOID",  "hustle, grind, revolutionary…")}
            {F("contentPillars",   "Content Pillars", "Success Stories, Education…")}
          </div>
        )}

        {/* ── ACCESS TAB ── */}
        {tab === "access" && (
          <div>
            <label style={{ fontSize: 11, color: "#374151", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.6px", fontWeight: 600 }}>
              Team Password
            </label>
            <div style={{ position: "relative", marginBottom: 8 }}>
              <input
                type={showPw ? "text" : "password"}
                value={s.password || ""}
                onChange={e => update("password", e.target.value)}
                style={{
                  width: "100%", background: "#060912",
                  border: "1px solid #111827", borderRadius: 8,
                  padding: "9px 42px 9px 12px",
                  color: "#f1f5f9", fontSize: 13,
                  fontFamily: "'DM Mono', monospace",
                }}
              />
              <button
                onClick={() => setShowPw(v => !v)}
                style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#374151", cursor: "pointer", fontSize: 14 }}>
                {showPw ? "🙈" : "👁"}
              </button>
            </div>
            <div style={{
              fontSize: 12, color: "#78350f",
              padding: "10px 14px",
              background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.15)",
              borderRadius: 8, lineHeight: 1.7,
            }}>
              ⚠️ Save settings first, then log out and back in with the new password.
              Default password is: <code style={{ color: "#fbbf24" }}>flashcall2026</code>
            </div>
          </div>
        )}
      </div>

      {/* Save row */}
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <button
          onClick={save}
          style={{
            background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
            border: "none", borderRadius: 9, padding: "11px 28px",
            color: "white", fontSize: 13, fontWeight: 700,
            cursor: "pointer",
            boxShadow: "0 4px 18px rgba(99,102,241,.35)",
          }}>
          Save Settings
        </button>
        {saved && (
          <span style={{ fontSize: 13, color: "#10b981", fontWeight: 600 }}>✓ Saved</span>
        )}
        <button
          onClick={handleReset}
          style={{
            marginLeft: "auto",
            background: "rgba(239,68,68,0.07)",
            border: "1px solid rgba(239,68,68,0.2)",
            borderRadius: 8, padding: "9px 14px",
            color: "#f87171", fontSize: 12, cursor: "pointer",
          }}>
          Reset to Defaults
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   LOGIN SCREEN
   ════════════════════════════════════════════════════════════════════ */
function LoginScreen({ onAuth }) {
  const [pw, setPw]           = useState("");
  const [err, setErr]         = useState(false);
  const [shaking, setShaking] = useState(false);
  const inputRef              = useRef(null);

  // Auto-focus the password field
  useEffect(() => {
    const t = setTimeout(() => inputRef.current?.focus(), 80);
    return () => clearTimeout(t);
  }, []);

  function attempt() {
    const correct = getCorrectPassword();
    if (pw === correct) {
      lsSet(K_AUTH, "1");
      onAuth();
    } else {
      setErr(true);
      setShaking(true);
      setPw("");
      setTimeout(() => setShaking(false), 500);
      setTimeout(() => inputRef.current?.focus(), 20);
    }
  }

  function handleKeyDown(e) {
    if (e.key === "Enter") attempt();
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "#04060e",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Bricolage Grotesque', 'DM Sans', sans-serif",
      padding: "20px",
    }}>
      <style>{`
        @keyframes loginShake {
          0%,100%{transform:translateX(0)}
          20%,60%{transform:translateX(-10px)}
          40%,80%{transform:translateX(10px)}
        }
      `}</style>

      <div style={{
        width: "100%", maxWidth: 360,
        animation: shaking ? "loginShake 0.45s ease" : "none",
      }}>
        {/* Logo block */}
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{
            width: 64, height: 64, borderRadius: 18,
            margin: "0 auto 18px",
            background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 28, animation: "glow 3s ease infinite",
            boxShadow: "0 0 40px rgba(99,102,241,0.4)",
          }}>
            ⚡
          </div>
          <h1 style={{
            fontSize: 26, fontWeight: 800, color: "#f1f5f9",
            letterSpacing: "-0.6px", marginBottom: 7,
          }}>
            Flashcall Reel OS
          </h1>
          <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.5 }}>
            Instagram Reels + TikTok · 10 concepts/day<br/>
            <span style={{ color: "#1e2d4a" }}>Team access only</span>
          </p>
        </div>

        {/* Card */}
        <div style={{
          background: "#08090f",
          border: "1px solid #0c1428",
          borderRadius: 18, padding: 28,
          boxShadow: "0 24px 80px rgba(0,0,0,0.6)",
        }}>
          <label style={{
            fontSize: 10, color: "#374151", display: "block",
            marginBottom: 8, textTransform: "uppercase", letterSpacing: "1px",
          }}>
            Password
          </label>
          <input
            ref={inputRef}
            type="password"
            value={pw}
            onChange={e => { setPw(e.target.value); setErr(false); }}
            onKeyDown={handleKeyDown}
            placeholder="Enter team password"
            style={{
              width: "100%", background: "#060912",
              border: `1px solid ${err ? "#ef4444" : "#111827"}`,
              borderRadius: 10, padding: "12px 14px",
              color: "#f1f5f9", fontSize: 14,
              fontFamily: "'DM Mono', monospace",
              marginBottom: err ? 8 : 20,
              transition: "border-color 0.2s",
            }}
          />
          {err && (
            <div style={{
              fontSize: 12, color: "#ef4444",
              marginBottom: 16, display: "flex", alignItems: "center", gap: 5,
            }}>
              <span>✗</span> Incorrect password. Please try again.
            </div>
          )}
          <button
            onClick={attempt}
            style={{
              width: "100%",
              background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
              border: "none", borderRadius: 10,
              padding: "13px", color: "white",
              fontSize: 14, fontWeight: 700,
              cursor: "pointer",
              boxShadow: "0 4px 20px rgba(99,102,241,0.4)",
              letterSpacing: "-0.2px",
              transition: "opacity 0.15s",
            }}>
            Enter →
          </button>
        </div>

        <p style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: "#1a2540" }}>
          Flashcall internal tool · not for public distribution
        </p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   ROOT APP — Authentication gate
   ════════════════════════════════════════════════════════════════════ */
function App() {
  // Read auth state from localStorage at init
  const [authed, setAuthed] = useState(() => {
    return lsGet(K_AUTH, null) === "1";
  });

  function handleAuth() {
    setAuthed(true);
  }

  function handleLogout() {
    lsSet(K_AUTH, null);
    setAuthed(false);
  }

  if (!authed) return <LoginScreen onAuth={handleAuth} />;
  return <MainApp onLogout={handleLogout} />;
}

/* ── RENDER ──────────────────────────────────────────────────────────
   Using React 18 createRoot (matches the imported react@18 UMD build).
   The old ReactDOM.render() API is removed in React 18 strict mode.
   ─────────────────────────────────────────────────────────────────── */
const rootEl = document.getElementById("root");
if (!rootEl) throw new Error("No #root element found in DOM.");
const appRoot = ReactDOM.createRoot(rootEl);
appRoot.render(<App />);
</script>
