function safeParseJSON(text) {
  const cleaned = text.replace(/```json/g,"").replace(/```/g,"").trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("Could not parse response. Please try again.");
  return JSON.parse(match[0]);
}

  s.githubToken   = loadSecret('githubToken')   || s.githubToken   || '';

}

// === SECRET VAULT (XOR-obfuscated + base64-wrapped) ===
const SEC_KEY = 'fc_sec_v1';
const XOR_SEED = 'fcos_v1_2026';
function xorCipher(str) {
  return str.split('').map((c,i) =>
    String.fromCharCode(c.charCodeAt(0) ^ XOR_SEED.charCodeAt(i % XOR_SEED.length))
  ).join('');
}
function saveSecret(name, value) {
  const vault = loadVault();
  vault[name] = btoa(unescape(encodeURIComponent(xorCipher(value))));
  localStorage.setItem(SEC_KEY, JSON.stringify(vault));
}
function loadSecret(name) {
  const vault = loadVault();
  if (!vault[name]) return '';
  try { return xorCipher(decodeURIComponent(escape(atob(vault[name])))); } catch(e) { return ''; }
}
function loadVault() {
  try { return JSON.parse(localStorage.getItem(SEC_KEY) || '{}'); } catch(e) { return {}; }
}

// === AI PROMPT SANITIZER ===
// Rewrites sensitive terms into policy-safe language so Gemini never blocks.
// The meaning and strategy stay identical - only surface words change.
function sanitizePrompt(text) {
  const replacements = [
    // Adult creator terms -> policy-safe equivalents
    [/\badult creator(s)?\b/gi, "subscription-based content creator$1"],
    [/\bonlyfans\b/gi, "exclusive content platform"],
    [/\bonly fans\b/gi, "exclusive content platform"],
    [/\bfansly\b/gi, "subscription content platform"],
    [/\badult content\b/gi, "exclusive subscriber content"],
    [/\badult entertainer(s)?\b/gi, "independent digital creator$1"],
    [/\bsex worker(s)?\b/gi, "independent content creator$1"],
    [/\berotic\b/gi, "premium exclusive"],
    [/\bnsfw\b/gi, "exclusive subscriber-only"],
    [/\bxxx\b/gi, "exclusive content"],
    [/\bporn(ography|ographic|o)?\b/gi, "exclusive digital content"],
    [/\bescort(s)?\b/gi, "premium service provider$1"],
    [/\bstripper(s)?\b/gi, "performance artist$1"],
    [/\bcam girl(s)?\b/gi, "live content creator$1"],
    [/\bcamming\b/gi, "live streaming"],
    // Keep the intent - monetizing creators - just reframe
    [/\bmonetize their (body|sexuality|looks)\b/gi, "monetize their personal brand"],
    [/\bsell (nudes|photos|explicit)\b/gi, "sell exclusive digital content"],
  ];
  let result = text;
  for (const [pattern, replacement] of replacements) {
    result = result.replace(pattern, replacement);
  }
  return result;
}

async function atGet(table, params="") {

}
async function atPost(table, records) {
  const r = await fetch(`https://api.airtable.com/v0/${getATBase()}/${encodeURIComponent(table)}`, {
    method:"POST", headers:getATHeaders(), body:JSON.stringify({ records })
  });

}

async function claude(system, userMsg, maxTokens=2000, jsonMode=false, model="flash") {
  const key = getSettings().geminiApiKey;
  if (!key) throw new Error("No Gemini API key. Add it in Settings -> Integrations.");
  const modelId = model === "pro" ? "gemini-2.5-flash" : "gemini-2.0-flash";
  const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + modelId + ":generateContent?key=" + key, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      system_instruction: { parts: [{ text: system }] },
      contents: [{ role:"user", parts:[{ text: userMsg }] }],
      generationConfig: { maxOutputTokens: maxTokens }
    })
  });
  const d = await r.json();
  if (d.error) throw new Error("Gemini error: " + d.error.message);
  const candidate = d.candidates?.[0];
  if (!candidate) throw new Error("No response from Gemini. Check your API key.");
  const raw = candidate.content?.parts?.map(p => p.text || "").join("") || "";
  if (candidate.finishReason === "MAX_TOKENS") throw new Error("Response truncated. Reduce content pieces in Settings and retry.");
  if (!raw) throw new Error("Empty response (reason: " + candidate.finishReason + ").");
  return raw;
}

function extractJSON(text) {
  if (!text) throw new Error("Empty response from AI.");
  var t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  try { return JSON.parse(t); } catch(e0) {}
  var start = t.indexOf("{");
  var end = t.lastIndexOf("}");
  if (start === -1) throw new Error("No JSON in response. Got: " + t.slice(0,120));
  if (end <= start) throw new Error("JSON was cut off mid-response. Please try again.");
  t = t.slice(start, end + 1);
  try { return JSON.parse(t); } catch(e1) {}
  var out = ""; var inStr = false; var i = 0;
  while (i < t.length) {
    var ch = t[i];
    var cc = ch.charCodeAt(0);
    if (inStr && cc === 92) { out += ch; i++; if (i < t.length) { out += t[i]; i++; } continue; }
    if (cc === 34) { inStr = !inStr; out += ch; i++; continue; }
    if (inStr && cc < 32) {
      if (cc === 10) out += "\n";
      else if (cc === 13) out += "\r";
      else if (cc === 9) out += "\t";
      else out += " ";
      i++; continue;
    }
    out += ch; i++;
  }
  try { return JSON.parse(out); } catch(e2) {
    throw new Error("JSON parse failed: " + e2.message + ". Response sample: " + t.slice(0,150));
  }
}

TARGET AUDIENCE THIS WEEK: ${category}

${trendContext}

PLATFORM & FORMAT RULES (STRICT):
- LinkedIn: text posts only. Professional, story-driven, first-person.
- Instagram: UGC-style Reels ONLY. No static image posts. Authentic, face-to-camera or POV style.
- TikTok: UGC-style videos ONLY. Raw, authentic, no polish. Trending audio hooks.
- Blog: Long-form SEO article.
- Email: Newsletter edition.
- NEVER plan image posts for Instagram or TikTok. ONLY video/reel formats.

CONTENT STRATEGY RULES:
1. Each piece must have a DIFFERENT angle - no repetition of themes.
2. Mix angles: personal story, hot take, myth-busting, how-to, case study, data insight.
3. Hooks must be scroll-stopping - curiosity gaps, surprising stats, bold statements.
4. Use trending angles: "unpopular opinion", "what I wish I knew", "nobody talks about this", "I tested X for Y days".
5. Only 1 in 5 pieces can mention the product. Others are pure value.
6. Every piece must feel like a real creator sharing their experience, not a brand.
7. Be specific - real numbers, real scenarios, real outcomes.

UGC VIDEO BRIEFS (for Instagram Reels and TikTok):
- Include a "ugcScript" field with a full talking-head script: HOOK(0-3s), BODY(3-45s), CTA(45-60s).
- Script must sound like natural speech, not corporate copy.
- Include [visual cues] like [look directly at camera], [hold up phone showing app], [walk and talk].
- Suggest trending audio style: e.g. "upbeat trending audio", "no music - raw voice only", "lo-fi background".

Return ONLY this JSON structure:
{"weeklyStrategy":"one sentence narrative arc","keyInsight":"the big idea tying content together","watchMetric":"which metric to track and why","content":[{"title":"content title","platform":"LinkedIn|Instagram|TikTok|Blog|Email","contentType":"LinkedIn Post|Instagram Reel|TikTok Video|Blog Article|Email Newsletter","format":"Text Post|UGC Reel|UGC Video|Long-form Article|Newsletter","day":"Monday|Tuesday|Wednesday|Thursday|Friday","pillar":"Success Stories|Education|Platform Tips|Industry Insights|Social Proof","angle":"personal story|hot take|myth-busting|how-to|case study|data insight","hook":"the first line - must stop the scroll","cta":"subtle CTA (not salesy)","brief":"3-4 sentences on what to write and the story to tell","ugcScript":"HOOK: [0-3s script]\nBODY: [3-45s script with visual cues]\nCTA: [45-60s script] - only for Instagram Reels and TikTok Videos, empty string for others","audioSuggestion":"trending audio style suggestion - only for video content, empty string for others","keywords":"relevant hashtags or SEO terms"}]}

Include: ${getSettings().linkedinPerWeek} LinkedIn Posts, ${getSettings().instagramPerWeek} Instagram Reels, ${getSettings().blogPerWeek} Blog Articles, 1 Email Newsletter, 2 TikTok Videos. Every hook must be genuinely scroll-stopping.`;
    try {
      const text = await claude("You are a senior CMO AI. Output ONLY raw valid JSON, no markdown, no backticks.", sanitizePrompt(prompt), 8192, false, "flash");
      // Show raw response for debugging
      if (!text || text.trim().length < 10) throw new Error("Empty response. Raw: " + JSON.stringify(text));
      const parsed = extractJSON(text);
      setPlan(parsed);
    } catch(e){ showToast("Error: " + (e.message || e), "error"); }
    setGenerating(false);
  }

  async function pushToAirtable() {
    if(!plan?.content) return;
    setPushing(true);
    const records = plan.content.map(item => {
      const d = new Date(weekStart);
      const offset = ["Monday","Tuesday","Wednesday","Thursday","Friday"].indexOf(item.day);
      d.setDate(d.getDate()+(offset>=0?offset:0));
      return { fields:{
        "Content Title":item.title, "Content Type":item.contentType, "Status":"Idea",
        "Publish Date":d.toISOString().split("T")[0], "Content Pillar":item.pillar,
        "Consultant Category":category, "Hook":item.hook, "CTA":item.cta,
        "Notes":item.brief, "Keywords / Hashtags":item.keywords||"",
        "Assigned Agent": item.contentType==="LinkedIn Post"?"LinkedIn Agent":item.contentType.includes("Instagram")?"Instagram Agent":item.contentType==="TikTok Video"?"TikTok Agent":item.contentType==="Blog Article"?"Blog Writer Agent":"Email Agent"
      }};
    });
    for(let i=0;i<records.length;i+=10) await atPost("Content Calendar", records.slice(i,i+10));
    setPushed(true); setPushing(false);
    showToast(`${records.length} items pushed to Airtable ✓`);
  }

  async function sendChat() {
    if(!chatInput.trim()||chatLoading) return;
    const msg = chatInput.trim(); setChatInput(""); setChatLoading(true);
    const history = [...chatMsgs.map(m=>({role:m.role,content:m.content})),{role:"user",content:msg}];
    setChatMsgs(history);
    try {
      const _key = getSettings().geminiApiKey;
      if (!_key) { setChatMsgs(m=>[...m,{role:"assistant",content:"⚠️ No Gemini API key set. Please add it in Settings -> Integrations."}]); setChatLoading(false); return; }
      const _sys = `${buildBrand(getSettings())}\n\nYou are the CMO Agent. Give sharp, specific strategic advice. Be concise.`;
      const _contents = history.map(m=>({ role: m.role==="assistant"?"model":"user", parts:[{text:m.content}] }));
      const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + _key, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ system_instruction:{parts:[{text:_sys}]}, contents:_contents, generationConfig:{maxOutputTokens:1000} })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      setChatMsgs(prev=>[...prev,{role:"assistant",content:d.candidates?.[0]?.content?.parts?.[0]?.text||"No response"}]);
    } catch(e){ setChatMsgs(prev=>[...prev,{role:"assistant",content:"Error: " + (e.message || e)}]); }
    setChatLoading(false);
  }

  const CATS = ["General","Career Coaches","Financial Advisors","Business Consultants","Fitness & Wellness","Life Coaches","Tech Advisors","Lawyers"];

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',sans-serif"}}>
      {toast && <Toast {...toast}/>}
      <div style={{display:"flex",gap:4,padding:"16px 24px 0",borderBottom:"1px solid #0d1525",background:"#06080f"}}>
        {[{id:"brief",label:"📋 Weekly Brief"},{id:"chat",label:"💬 Ask CMO"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn" style={{
            padding:"8px 16px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",
            background:tab===t.id?"#0a0e1c":"transparent",
            color:tab===t.id?"#f1f5f9":"#374151",fontSize:13,fontWeight:500,fontFamily:"inherit"
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:24}}>
        {tab==="brief" && (
          <div>
            <h2 style={{fontSize:20,fontWeight:700,color:"#f1f5f9",marginBottom:4,letterSpacing:"-0.3px"}}>Weekly Marketing Brief</h2>
            <p style={{fontSize:13,color:"#374151",marginBottom:12}}>Tell your CMO what matters this week -> get a full content plan.</p>
            {trendData ? (
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"8px 12px",background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:8}}>
                <span>🔍</span>
                <span style={{fontSize:12,color:"#a78bfa",flex:1}}>Live trend data active - plan will use real-time trends</span>
                <span style={{fontSize:11,color:"#10b981",fontWeight:600}}>✓ Live</span>
              </div>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"8px 12px",background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.15)",borderRadius:8}}>
                <span>⚠️</span>
                <span style={{fontSize:12,color:"#fbbf24"}}>No trend data - run Trend Agent first for a smarter plan</span>
              </div>
            )}

            <div style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:20,marginBottom:16}}>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,color:"#374151",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.6px"}}>Week Starting</label>
                <input type="date" value={weekStart} onChange={e=>setWeekStart(e.target.value)}
                  style={{background:"#060810",border:"1px solid #111827",borderRadius:8,padding:"9px 12px",color:"#f1f5f9",fontSize:13,fontFamily:"'DM Mono',monospace"}}/>
              </div>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,color:"#374151",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.6px"}}>Target Consultant Category</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {CATS.map(cat=>(
                    <button key={cat} onClick={()=>setCategory(cat)} style={{
                      padding:"5px 12px",borderRadius:20,border:"1px solid",fontFamily:"inherit",
                      borderColor:category===cat?"#3b82f6":"#111827",
                      background:category===cat?"rgba(59,130,246,0.12)":"transparent",
                      color:category===cat?"#60a5fa":"#4b5563",fontSize:12,cursor:"pointer"
                    }}>{cat}</button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,color:"#374151",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.6px"}}>Your Focus / Priority This Week</label>
                <textarea value={focus} onChange={e=>setFocus(e.target.value)} rows={3}
                  placeholder="e.g. 'Push career coaches. We just hit 500 consultants - use as social proof. New instant call feature launched.'"
                  style={{width:"100%",background:"#060810",border:"1px solid #111827",borderRadius:8,padding:"10px 12px",color:"#f1f5f9",fontSize:13,resize:"vertical",lineHeight:1.6,fontFamily:"'DM Sans',sans-serif"}}/>
              </div>
              <button onClick={generate} disabled={generating||!focus.trim()} style={{
                background:focus.trim()&&!generating?"linear-gradient(135deg,#3b82f6,#06b6d4)":"#111827",
                border:"none",borderRadius:8,padding:"11px 24px",
                color:focus.trim()&&!generating?"white":"#374151",
                fontSize:13,fontWeight:600,cursor:focus.trim()&&!generating?"pointer":"not-allowed",fontFamily:"inherit",
                display:"flex",alignItems:"center",gap:8
              }}>{generating?<><Spinner/> Generating...</>:"⚡ Generate Weekly Plan"}</button>
            </div>

            {plan && !plan.error && (
              <div>
                <div style={{background:"linear-gradient(135deg,rgba(59,130,246,0.08),rgba(6,182,212,0.06))",border:"1px solid rgba(59,130,246,0.15)",borderRadius:12,padding:20,marginBottom:16}}>
                  <div style={{fontSize:11,color:"#3b82f6",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10,fontWeight:600}}>CMO WEEKLY STRATEGY</div>
                  <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.7,marginBottom:16}}>{plan.weeklyStrategy}</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:12}}>
                      <div style={{fontSize:10,color:"#374151",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Key Insight</div>
                      <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.5}}>{plan.keyInsight}</div>
                    </div>
                    <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:12}}>
                      <div style={{fontSize:10,color:"#374151",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Watch Metric</div>
                      <div style={{fontSize:12,color:"#10b981",fontWeight:500}}>{plan.watchMetric}</div>
                    </div>
                  </div>
                </div>

                <div style={{marginBottom:16}}>
                  {plan.content?.map((item,i)=>(
                    <ContentCard key={i} item={item}/>
                  ))}
          </div>
        )}

        {tab==="chat" && (
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)"}}>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:16}}>
              {chatMsgs.map((m,i)=>(
                <div key={i} style={{display:"flex",gap:10,flexDirection:m.role==="user"?"row-reverse":"row",alignItems:"flex-start"}}>

              {chatLoading && <div style={{display:"flex",gap:10}}><div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#3b82f6,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"white"}}>C</div><div style={{padding:"11px 14px",borderRadius:10,background:"#0a0e1c",border:"1px solid #0d1525"}}><span style={{animation:"pulse 1.5s infinite",display:"inline-block",fontSize:18,letterSpacing:4}}>···</span></div></div>}

// === WRITER AGENT ===
function WriterAgent() {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [output, setOutput] = useState("");
  const [writing, setWriting] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [filter, setFilter] = useState("All");
  const [brief, setBrief] = useState("");
  const [toast, setToast] = useState(null);

  useEffect(()=>{ load(); },[]);

  function showToast(msg,type="success"){ setToast({msg,type}); setTimeout(()=>setToast(null),3000); }

  async function load() {
    setLoading(true);
    const d = await atGet("Content Calendar","maxRecords=50&sort[0][field]=Publish%20Date&sort[0][direction]=asc");
    setRecords(d.records||[]); setLoading(false);
  }

  const FORMAT_INSTRUCTIONS = {
    "LinkedIn Post": "Write a LinkedIn post (150-300 words). Hook on line 1. Short paragraphs. 3-5 hashtags at end.",
    "Instagram Post": "Write an Instagram caption (100-150 words). Punchy hook. Emojis sparingly. 8-12 hashtags.",
    "Instagram Reel": "Write a Reel script (60-90 sec). Label: HOOK(0-3s), PROBLEM(3-15s), SOLUTION(15-45s), PROOF(45-55s), CTA(55-60s). Include [on-screen text] suggestions.",
    "TikTok Video": "Write a TikTok script (30-60 sec). Ultra-specific hook (first 2 sec). 3-5 rapid-fire points. Casual tone.",
    "Blog Article": "Write a full SEO blog article (900-1200 words). Include: SEO title, intro, 3-4 H2 sections, conclusion, meta description (160 chars). Use ## for H2s.",
    "Email Newsletter": "Write a full 'The Consultant Edge' newsletter edition. Include: subject line, preview text, opening, success story (150w), main tip (150w), platform spotlight (100w), CTA, sign-off.",
  };

  async function write() {
    if(!selected) return;
    setWriting(true); setOutput(""); setSaved(false);
    const f = selected.fields;
    const prompt = `${buildBrand(getSettings())}

WRITING TASK:
- Title: ${f["Content Title"]}
- Format: ${f["Content Type"]}
- Pillar: ${f["Content Pillar"]}
- Target Reader: ${f["Consultant Category"]||"General consultant"}
- Hook: ${f["Hook"]||"Write a compelling opening"}
- Keywords: ${f["Keywords / Hashtags"]||""}
- Extra instructions: ${brief||"None"}

WRITING RULES:
1. Open immediately with the hook - no preamble, no greetings.
2. Write in first person like a real consultant sharing their experience.
3. Short paragraphs - 1-3 lines max for social, longer for blog.
4. ${getSettings().productName} should only appear at the end as a natural solution, never at the start.
5. End with a soft question or engagement CTA - never "sign up now".
6. NO corporate language. NO "game-changing". NO "Flashcall helps you...".
7. Use specific numbers, real scenarios, concrete outcomes.

FORMAT:
${FORMAT_INSTRUCTIONS[f["Content Type"]]||"Write compelling, human content."}

Output ONLY the finished content. Start immediately.`;
    try {
      const text = await claude("You are a ghostwriter for consultants. Write organic, human, story-driven content. Sound like a real person, never a brand.", sanitizePrompt(prompt));
      setOutput(text);
    } catch(e){ setOutput("Error: " + (e.message || e)); }
    setWriting(false);
  }

  async function save() {
    if(!selected||!output) return;
    setSaving(true);
    await atPatch("Content Calendar", selected.id, {"Caption / Body Copy":output, "Status":"Review"});
    setSaved(true); setSaving(false);
    setRecords(prev=>prev.map(r=>r.id===selected.id?{...r,fields:{...r.fields,"Caption / Body Copy":output,"Status":"Review"}}:r));
    showToast("Saved to Airtable - status set to Review ✓");
  }

  const types = ["All","LinkedIn Post","Instagram Post","Instagram Reel","TikTok Video","Blog Article","Email Newsletter"];
  const filtered = filter==="All"?records:records.filter(r=>r.fields["Content Type"]===filter);
  const words = output.split(/\s+/).filter(Boolean).length;

  if(selected) return (
    <div style={{height:"100%",display:"flex",fontFamily:"'DM Sans',sans-serif"}}>
      {toast && <Toast {...toast}/>}
      {/* Left panel */}
      <div style={{width:280,flexShrink:0,borderRight:"1px solid #0d1525",padding:20,overflowY:"auto",background:"#060810"}}>
        <button onClick={()=>{setSelected(null);setOutput("");}} style={{background:"transparent",border:"1px solid #111827",borderRadius:6,padding:"5px 10px",color:"#4b5563",fontSize:11,cursor:"pointer",fontFamily:"inherit",marginBottom:16}}>{"<- Back"}</button>
        <div style={{background:`${CH_ICONS[selected.fields["Content Type"]]?"rgba(99,102,241,0.08)":"rgba(99,102,241,0.08)"}`,border:"1px solid rgba(99,102,241,0.15)",borderRadius:10,padding:14,marginBottom:16}}>
          <div style={{fontSize:20,marginBottom:6}}>{CH_ICONS[selected.fields["Content Type"]]||"📄"}</div>
          <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9"}}>{selected.fields["Content Type"]}</div>
          <div style={{fontSize:11,color:"#374151"}}>{selected.fields["Consultant Category"]||"General"}</div>
        </div>
        {[["Title",selected.fields["Content Title"]],["Hook",selected.fields["Hook"]],["CTA",selected.fields["CTA"]],["Pillar",selected.fields["Content Pillar"]]].map(([l,v])=>v&&(
          <div key={l} style={{marginBottom:14}}>
            <div style={{fontSize:10,color:"#374151",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:5}}>{l}</div>
            <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontStyle:l==="Hook"?"italic":"normal"}}>"{v}"</div>
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"#374151",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:6}}>Extra Brief</div>
          <textarea value={brief} onChange={e=>setBrief(e.target.value)} rows={3} placeholder="Additional angles or instructions..."
            style={{width:"100%",background:"#060810",border:"1px solid #111827",borderRadius:7,padding:"8px 10px",color:"#e2e8f0",fontSize:12,resize:"vertical",lineHeight:1.5,fontFamily:"'DM Sans',sans-serif"}}/>
        </div>
        <button onClick={write} disabled={writing} style={{width:"100%",padding:"11px",background:writing?"#111827":"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,color:writing?"#4b5563":"white",fontSize:13,fontWeight:600,cursor:writing?"not-allowed":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {writing?<><Spinner/> Writing...</>:"✍️ Write Content"}
        </button>
      </div>
      {/* Right panel */}
      <div style={{flex:1,display:"flex",flexDirection:"column",background:"#05070f"}}>
        <div style={{padding:"12px 20px",borderBottom:"1px solid #0d1525",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:13,color:"#374151"}}>Output</span>
            {output&&<span style={{fontSize:11,color:"#1f2937",fontFamily:"'DM Mono',monospace"}}>{words} words</span>}
          </div>
          {output&&(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>navigator.clipboard.writeText(output)} style={{background:"#0a0e1c",border:"1px solid #111827",borderRadius:6,padding:"5px 12px",color:"#64748b",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Copy</button>
              <button onClick={write} disabled={writing} style={{background:"#0a0e1c",border:"1px solid #111827",borderRadius:6,padding:"5px 12px",color:"#64748b",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>↻ Rewrite</button>
              {saved?<span style={{color:"#10b981",fontSize:12,fontWeight:600,padding:"0 8px"}}>✓ Saved</span>:
                <button onClick={save} disabled={saving} style={{background:"#10b981",border:"none",borderRadius:6,padding:"5px 14px",color:"white",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  {saving?<><Spinner/> Saving...</>:"-> Save"}
                </button>}
            </div>
          )}
        </div>
        <div style={{flex:1,overflow:"hidden"}}>
          {!output&&!writing&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#1f2937"}}><div style={{fontSize:40,marginBottom:12}}>✍️</div><div style={{fontSize:13,color:"#374151"}}>Click "Write Content" to generate</div></div>}
          {writing&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%"}}><div style={{fontSize:28,marginBottom:12,animation:"shimmer 1.5s infinite"}}>✍️</div><div style={{fontSize:13,color:"#4b5563"}}>Writing in Flashcall's voice...</div></div>}
          {output&&!writing&&<textarea value={output} onChange={e=>setOutput(e.target.value)} style={{width:"100%",height:"100%",background:"transparent",border:"none",padding:"24px 28px",color:"#cbd5e1",fontSize:13,lineHeight:1.9,resize:"none",fontFamily:"'DM Sans',sans-serif"}}/>}
        </div>
      </div>
    </div>
  );

  return (

    <div style={{padding:24,fontFamily:"'DM Sans',sans-serif",height:"100%",overflowY:"auto"}}>
      {toast && <Toast {...toast}/>}
      <h2 style={{fontSize:20,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>Content Queue</h2>
      <p style={{fontSize:13,color:"#374151",marginBottom:16}}>Select any item to write full content.</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {types.map(t=>(

// === DISTRIBUTION AGENT ===
function DistributionAgent() {
  const [records, setRecords] = useState([]);

  const [preview, setPreview] = useState(null);
  const [updating, setUpdating] = useState(null);
  const [schedDate, setSchedDate] = useState("");
  const [schedId, setSchedId] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(()=>{ load(); },[]);
  function showToast(msg,type="success"){ setToast({msg,type}); setTimeout(()=>setToast(null),3000); }

    setUpdating(id);

    setRecords(prev=>prev.map(r=>r.id===id?{...r,fields:{...r.fields,Status:status,...extra}}:r));
    if(preview?.id===id) setPreview(prev=>({...prev,fields:{...prev.fields,Status:status,...extra}}));

  const ready = records.filter(r=>["Approved","Scheduled"].includes(r.fields.Status));

            <div style={{display:"flex",gap:8}}>

              <button onClick={()=>setSchedId(null)} style={{background:"#1e293b",border:"none",borderRadius:7,padding:"9px 14px",color:"#64748b",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Preview modal */}
      {preview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setPreview(null)}>
          <div style={{background:"#0d1525",border:"1px solid #1e293b",borderRadius:14,padding:24,maxWidth:600,width:"100%",maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

            </div>
            <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.8,whiteSpace:"pre-wrap",background:"#060910",borderRadius:8,padding:16,border:"1px solid #111827",marginBottom:16}}>
              {preview.fields["Caption / Body Copy"]||<span style={{color:"#374151",fontStyle:"italic"}}>No content written yet.</span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              {preview.fields.Status==="Approved"&&<button onClick={()=>{setSchedId(preview.id);const d=preview.fields["Publish Date"];if(d)setSchedDate(d);setPreview(null);}} style={{background:"#8b5cf6",border:"none",borderRadius:7,padding:"8px 16px",color:"white",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📅 Schedule</button>}
              {preview.fields.Status==="Scheduled"&&<button onClick={()=>{updateStatus(preview.id,"Published");setPreview(null);}} style={{background:"#059669",border:"none",borderRadius:7,padding:"8px 16px",color:"white",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🚀 Mark Published</button>}

                {ready.map((r,i)=>{const f=r.fields;const sc=STATUS_COLORS[f.Status]||"#4b5563";const hasC=!!f["Caption / Body Copy"]; return(
                  <div key={r.id} className="row-hover" onClick={()=>setPreview(r)} style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:10,padding:"13px 16px",marginBottom:8,display:"grid",gridTemplateColumns:"1fr 90px 100px 160px",gap:12,alignItems:"center",animation:`fadeUp 0.2s ease ${i*0.04}s forwards`,opacity:0}}>

                    <div style={{display:"inline-flex",padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:600,background:`${sc}15`,color:sc}}>{f.Status}</div>
                    <div style={{fontSize:11,color:hasC?"#10b981":"#f59e0b"}}>{hasC?"✓ Ready":"⚠ No copy"}</div>
                    <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                      {f.Status==="Approved"&&hasC&&<button onClick={()=>{setSchedId(r.id);const d=f["Publish Date"];if(d)setSchedDate(d);}} style={{background:"rgba(139,92,246,0.15)",border:"1px solid rgba(139,92,246,0.3)",borderRadius:6,padding:"5px 10px",color:"#a78bfa",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📅 Schedule</button>}
                      {f.Status==="Scheduled"&&<button onClick={()=>updateStatus(r.id,"Published")} style={{background:"rgba(5,150,105,0.15)",border:"1px solid rgba(5,150,105,0.3)",borderRadius:6,padding:"5px 10px",color:"#34d399",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{updating===r.id?<Spinner/>:"🚀 Publish"}</button>}
                    </div>
                  </div>

            {needs.length>0&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:13,fontWeight:500,color:"#4b5563",marginBottom:10}}>Needs Content / Review <span style={{marginLeft:6}}>{needs.length}</span></div>
                {needs.map(r=>{const f=r.fields;const sc=STATUS_COLORS[f.Status]||"#4b5563";return(
                  <div key={r.id} style={{background:"#080c18",border:"1px solid #0d1220",borderRadius:8,padding:"10px 14px",marginBottom:6,display:"flex",gap:10,alignItems:"center",opacity:0.6}}>
                    <span style={{fontSize:13}}>{CH_ICONS[f["Content Type"]]||"📄"}</span>
                    <span style={{fontSize:13,color:"#64748b",flex:1}}>{f["Content Title"]}</span>
                    <span style={{fontSize:10,color:sc,background:`${sc}15`,padding:"2px 7px",borderRadius:4}}>{f.Status}</span>
                    <span style={{fontSize:10,color:"#374151"}}>Use Writer Agent</span>
                  </div>
                );})}
              </div>
            )}
            {done.length>0&&(
              <div>
                <div style={{fontSize:13,fontWeight:500,color:"#4b5563",marginBottom:10}}>Published <span style={{color:"#34d399",marginLeft:6}}>{done.length}</span></div>
                {done.map(r=><div key={r.id} style={{background:"#080c18",border:"1px solid #0a1a12",borderRadius:8,padding:"10px 14px",marginBottom:6,display:"flex",gap:10,alignItems:"center",opacity:0.7}}><span style={{color:"#059669"}}>✓</span><span style={{fontSize:13}}>{CH_ICONS[r.fields["Content Type"]]||"📄"}</span><span style={{fontSize:13,color:"#64748b",flex:1}}>{r.fields["Content Title"]}</span><span style={{fontSize:11,color:"#1f2937",fontFamily:"'DM Mono',monospace"}}>{r.fields["Publish Date"]?new Date(r.fields["Publish Date"]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):""}</span></div>)}
              </div>

            {ready.length===0&&needs.length===0&&!loading&&<div style={{textAlign:"center",padding:80,color:"#374151"}}><div style={{fontSize:36,marginBottom:12}}>📭</div>Queue empty. Generate a plan in CMO Agent.</div>}

          <div>
            <h3 style={{fontSize:16,fontWeight:600,color:"#f1f5f9",marginBottom:16}}>Weekly Schedule</h3>

              {days.map(day=>(
                <div key={day} style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:10,padding:"12px 10px",minHeight:100}}>

                  </div>
                  <a href={ch.url} target="_blank" rel="noreferrer" style={{display:"inline-block",padding:"7px 14px",background:`${ch.color}12`,border:`1px solid ${ch.color}30`,borderRadius:7,color:ch.color,fontSize:11,fontWeight:600,textDecoration:"none"}}>Connect {ch.via} ↗</a>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  const [generating, setGenerating] = useState(false);

  useEffect(()=>{
    load();

  }

    </div>
  );

  const latest=analyticsRecs[0]?.fields||{};
  const prev2=analyticsRecs[1]?.fields||{};

    <div style={{height:"100%",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',sans-serif"}}>
      {toast&&<Toast {...toast}/>}

        {[{id:"input",l:"✏️ Log Metrics"},{id:"dashboard",l:"📈 Dashboard"},{id:"report",l:"📋 Report"},{id:"history",l:"🗂 History"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn" style={{padding:"8px 16px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",background:tab===t.id?"#0a0e1c":"transparent",color:tab===t.id?"#f1f5f9":"#374151",fontSize:13,fontWeight:500,fontFamily:"inherit"}}>{t.l}</button>

        {tab==="input"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>Log Weekly Metrics</h2>
            <p style={{fontSize:13,color:"#374151",marginBottom:20}}>2 minutes every Friday. Your whole week measured.</p>
            <div style={{marginBottom:16}}>

            </div>
            {[
              {label:"🎯 Primary",color:"#10b981",fields:[["newSignups","New Consultant Sign-ups"],["profile_comp","Profile Completion %",0.1]]},
              {label:"💼 LinkedIn",color:"#0077b5",fields:[["li_imp","Impressions"],["li_eng","Engagement %",0.1],["li_fol","Followers"]]},
              {label:"📸 Instagram",color:"#e1306c",fields:[["ig_reach","Reach"],["ig_fol","Followers"]]},
              {label:"🎵 TikTok",color:"#69c9d0",fields:[["tt_views","Views"],["tt_fol","Followers"]]},
              {label:"📝 Blog",color:"#10b981",fields:[["blog_sess","Sessions"],["blog_new","New Users"]]},
              {label:"📧 Email",color:"#f59e0b",fields:[["email_subs","Subscribers"],["email_or","Open Rate %",0.1],["email_cr","Click Rate %",0.1]]},
            ].map(section=>(

}

function SettingsPanel({ onClose }) {
  const [s, setS] = useState(loadSettings());
  const [saved, setSaved] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [activeTab, setActiveTab] = useState("integrations");
  const [showPw, setShowPw] = useState(false);
  const [showToken, setShowToken] = useState(false);

  function update(key, val) { setS(prev => ({...prev, [key]: val})); setSaved(false); setTestResult(null); }

  function save() {
    saveSettings(s);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  }

  async function testAirtable() {
    setTesting(true); setTestResult(null);
    try {
      const r = await fetch(`https://api.airtable.com/v0/${s.airtableBase}/Content%20Calendar?maxRecords=1`, {
        headers: { Authorization: `Bearer ${s.airtableToken}` }
      });
      const d = await r.json();
      if (d.records) setTestResult({ ok: true, msg: `✓ Connected - ${d.records.length >= 0 ? "Content Calendar found" : ""}` });
      else setTestResult({ ok: false, msg: `✗ ${d.error?.message || "Connection failed"}` });
    } catch(e) { setTestResult({ ok: false, msg: "✗ Network error" }); }
    setTesting(false);
  }

  const TABS = [
    { id:"integrations", label:"🔌 Integrations" },
    { id:"product",      label:"📦 Product" },
    { id:"brand",        label:"🎨 Brand Voice" },
    { id:"content",      label:"📅 Content Plan" },
    { id:"targets",      label:"🎯 KPI Targets" },
    { id:"access",       label:"🔐 Access" },
  ];

  const inp = (key, label, placeholder, type="text", mono=false) => (
    <div style={{marginBottom:16}}>
      <label style={{fontSize:11,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.6px"}}>{label}</label>
      <input type={type} value={s[key]} onChange={e=>update(key,e.target.value)} placeholder={placeholder}
        style={{width:"100%",background:"#060810",border:"1px solid #111827",borderRadius:8,padding:"9px 12px",color:"#f1f5f9",fontSize:13,fontFamily:mono?"'DM Mono',monospace":"inherit"}}/>
    </div>
  );

  const area = (key, label, placeholder, rows=3) => (
    <div style={{marginBottom:16}}>
      <label style={{fontSize:11,color:"#374151",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.6px"}}>{label}</label>
      <textarea rows={rows} value={s[key]} onChange={e=>update(key,e.target.value)} placeholder={placeholder}

        {/* Header */}
        <div style={{padding:"20px 24px",borderBottom:"1px solid #0d1525",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:"#f1f5f9",letterSpacing:"-0.3px"}}>⚙️ Settings</div>
            <div style={{fontSize:12,color:"#374151",marginTop:2}}>All changes save to your browser. No code editing needed.</div>
          </div>
          <button onClick={onClose} style={{background:"#111827",border:"1px solid #1e293b",borderRadius:7,width:32,height:32,color:"#64748b",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>✕</button>
        </div>

        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {/* Sidebar tabs */}
          <div style={{width:180,flexShrink:0,borderRight:"1px solid #0d1525",padding:"12px 10px",background:"#060810"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
                width:"100%",display:"block",padding:"9px 12px",borderRadius:8,border:"none",cursor:"pointer",textAlign:"left",
                background:activeTab===t.id?"#0d1525":"transparent",
                color:activeTab===t.id?"#f1f5f9":"#4b5563",
                fontSize:12,fontWeight:activeTab===t.id?500:400,fontFamily:"inherit",marginBottom:2,transition:"all 0.15s"
              }}>{t.label}</button>

            <div style={{marginTop:"auto",paddingTop:16,borderTop:"1px solid #0d1525",marginTop:16}}>
              <div style={{fontSize:10,color:"#1f2937",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:8}}>Danger Zone</div>

// === TREND RESEARCH AGENT ===
function TrendAgent() {
  const [loading, setLoading]   = useState(false);
  const [trends, setTrends]     = useState(null);
  const [lastRun, setLastRun]   = useState(()=>localStorage.getItem("fc_trends_time")||null);
  const [saved, setSaved]       = useState(false);
  const [toast, setToast]       = useState(null);
  const [platform, setPlatform] = useState("all");
  const s = getSettings();

  useEffect(()=>{
    const cached = localStorage.getItem("fc_trends_data");
    if (cached) { try { setTrends(JSON.parse(cached)); } catch(e) {} }
  }, []);

  function showToast(msg, type="success") {
    setToast({msg,type}); setTimeout(()=>setToast(null), 3500);
  }

  async function research() {
    setLoading(true); setSaved(false);
    const key = getSettings().geminiApiKey;
    if (!key) { showToast("Add your Gemini API key in Settings first", "error"); setLoading(false); return; }
    const plats = platform==="all" ? "LinkedIn, Instagram, TikTok, Twitter/X, YouTube" : platform;
    const today = new Date().toDateString();
    const prompt = "You are a real-time trend research agent for " + s.productName + " (" + s.productDesc + ").\n\n" +
      "Target audience: " + sanitizePrompt(s.targetAudience) + "\n" +
      "Today: " + today + "\n\n" +
      "Use Google Search to find what is ACTUALLY trending RIGHT NOW on " + plats + " for consultants, coaches, and knowledge experts monetizing their expertise.\n\n" +
      "Search for: trending LinkedIn content this week, viral Instagram reels for coaches, TikTok trends for consultants " + today + ", Twitter X trending topics business, YouTube trending topics for coaches.\n\n" +
      "Based on your search results, return ONLY this JSON (no markdown, no extra text):\n" +
      "{" +
        "\"summary\": \"2-3 sentence overview of what is genuinely trending this week based on search results\"," +
        "\"platforms\": [" +
          "{\"name\": \"LinkedIn\", \"icon\": \"💼\", \"topTrends\": [\"specific trend 1\", \"specific trend 2\", \"specific trend 3\"], \"viralFormat\": \"what format is viral now\", \"topHashtags\": [\"#tag1\", \"#tag2\", \"#tag3\"], \"insight\": \"one sharp tactical insight\"}," +
          "{\"name\": \"Instagram\", \"icon\": \"📸\", \"topTrends\": [\"trend1\", \"trend2\", \"trend3\"], \"viralFormat\": \"best format\", \"topHashtags\": [\"#tag1\", \"#tag2\", \"#tag3\"], \"insight\": \"insight\"}," +
          "{\"name\": \"TikTok\", \"icon\": \"🎵\", \"topTrends\": [\"trend1\", \"trend2\", \"trend3\"], \"viralFormat\": \"best format\", \"topHashtags\": [\"#tag1\", \"#tag2\", \"#tag3\"], \"insight\": \"insight\"}," +
          "{\"name\": \"Twitter/X\", \"icon\": \"🐦\", \"topTrends\": [\"trend1\", \"trend2\", \"trend3\"], \"viralFormat\": \"best format\", \"topHashtags\": [\"#tag1\", \"#tag2\", \"#tag3\"], \"insight\": \"insight\"}," +
          "{\"name\": \"YouTube\", \"icon\": \"▶️\", \"topTrends\": [\"trend1\", \"trend2\", \"trend3\"], \"viralFormat\": \"best format\", \"topHashtags\": [\"#tag1\", \"#tag2\", \"#tag3\"], \"insight\": \"insight\"}" +
        "]," +
        "\"crossPlatformThemes\": [\"theme1\", \"theme2\", \"theme3\"]," +
        "\"avoidThisWeek\": [\"what not to post 1\", \"what not to post 2\"]," +
        "\"cmoRecommendation\": \"2-3 sentence actionable recommendation for planning this week based on real search findings\"," +
        "\"hotTopics\": [\"specific hot topic 1\", \"specific hot topic 2\", \"specific hot topic 3\", \"specific hot topic 4\", \"specific hot topic 5\"]" +
      "}";

    try {
      // Use Gemini with Google Search grounding for real-time data
      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + key,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: "You are a real-time trend research AI. Always use Google Search to find current trends before answering. Return ONLY raw JSON with no markdown formatting." }] },
            contents: [{ role: "user", parts: [{ text: prompt }] }],
            tools: [{ google_search: {} }],
            generationConfig: { maxOutputTokens: 8192 }
          })
        }
      );
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      
      // Extract text from response (may include search result blocks)
      const text = (data.candidates?.[0]?.content?.parts || [])
        .filter(p => p.text)
        .map(p => p.text)
        .join("");
      
      if (!text) throw new Error("No response from Gemini. Check your API key.");
      
      const parsed = extractJSON(text);
      setTrends(parsed);
      const now = new Date().toLocaleString();
      setLastRun(now);
      localStorage.setItem("fc_trends_data", JSON.stringify(parsed));
      localStorage.setItem("fc_trends_time", now);
      showToast("Live trends fetched via Google Search ✓");
    } catch(e) { showToast("Error: " + (e.message || e), "error"); }
    setLoading(false);
  }

  async function saveToAirtable() {
    if (!trends) return; setSaved(true);
    try {
      const notes = "TRENDS " + new Date().toDateString() +
        "\n\nSUMMARY: " + trends.summary +
        "\n\nHOT TOPICS: " + (trends.hotTopics||[]).join(", ") +
        "\n\nCMO RECOMMENDATION: " + trends.cmoRecommendation;
      await atPost("Agent Task Queue", [{fields:{"Task Name":"Trend Research - "+new Date().toDateString(),"Agent":"Trend Agent","Status":"Completed","Notes":notes}}]);
      showToast("Saved to Airtable ✓");
    } catch(e) { showToast("Airtable error: "+e.message, "error"); setSaved(false); }
  }

  const PLATS = ["all","LinkedIn","Instagram","TikTok","Twitter/X","YouTube"];

  return (
    <div style={{minHeight:"100%",background:"#05070f",fontFamily:"'DM Sans',sans-serif",padding:24,color:"#e2e8f0"}}>
      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#7f1d1d":"#052e16",border:"1px solid "+(toast.type==="error"?"#ef4444":"#10b981"),color:toast.type==="error"?"#fca5a5":"#6ee7b7",padding:"10px 20px",borderRadius:10,fontSize:13,zIndex:999}}>{toast.msg}</div>}
      <div style={{maxWidth:860,margin:"0 auto"}}>
        <div style={{marginBottom:24}}>
          <h2 style={{fontSize:20,fontWeight:800,color:"#f1f5f9",marginBottom:4}}>🔍 Trend Research Agent</h2>
          <p style={{fontSize:13,color:"#374151"}}>Real-time trend intelligence - feeds directly into your weekly CMO plan.</p>
          {lastRun && <p style={{fontSize:11,color:"#1f2937",marginTop:4}}>Last run: {lastRun}</p>}
        </div>

        <div style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:20,marginBottom:20}}>
          <div style={{fontSize:11,color:"#374151",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:10}}>Platforms to Research</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {PLATS.map(p=>(
              <button key={p} onClick={()=>setPlatform(p)} style={{padding:"6px 14px",borderRadius:20,border:"1px solid "+(platform===p?"#8b5cf6":"#0d1525"),fontSize:12,cursor:"pointer",fontFamily:"inherit",background:platform===p?"rgba(139,92,246,0.1)":"transparent",color:platform===p?"#8b5cf6":"#4b5563"}}>
                {p==="all"?"All Platforms":p}
              </button>
            ))}
          </div>
          <button onClick={research} disabled={loading} style={{background:"linear-gradient(135deg,#8b5cf6,#06b6d4)",border:"none",borderRadius:8,padding:"10px 24px",color:"white",fontSize:13,fontWeight:600,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",opacity:loading?0.7:1,display:"flex",alignItems:"center",gap:8}}>
            {loading ? <><span style={{animation:"spin 0.8s linear infinite",display:"inline-block"}}>⟳</span> Researching...</> : "🔍 Research Trends Now"}
          </button>
        </div>

        {!trends && !loading && (
          <div style={{textAlign:"center",padding:"60px 0",color:"#1f2937"}}>
            <div style={{fontSize:40,marginBottom:16}}>🔍</div>
            <div style={{fontSize:14,marginBottom:4}}>No trend data yet</div>
            <div style={{fontSize:12}}>Click Research Trends Now to get started</div>
          </div>
        )}

        {trends && (
          <div style={{animation:"fadeUp 0.4s ease"}}>
            <div style={{background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:12,padding:20,marginBottom:16}}>
              <div style={{fontSize:11,color:"#8b5cf6",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:8}}>📡 This Week's Trend Summary</div>
              <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.7,marginBottom:16}}>{trends.summary}</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <div style={{fontSize:10,color:"#374151",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>🔥 Hot Topics</div>
                  {(trends.hotTopics||[]).map((t,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <div style={{width:18,height:18,borderRadius:4,background:"rgba(139,92,246,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#8b5cf6",fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <span style={{fontSize:12,color:"#94a3b8"}}>{t}</span>

                  ))}
                </div>
                <div>
                  <div style={{fontSize:10,color:"#374151",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>🌊 Cross-Platform Themes</div>
                  {(trends.crossPlatformThemes||[]).map((t,i)=>(
                    <div key={i} style={{fontSize:12,color:"#94a3b8",marginBottom:6,paddingLeft:8,borderLeft:"2px solid rgba(6,182,212,0.3)"}}>{t}</div>

              {label:"Consultant Sign-ups",val:latest["New Consultant Sign-ups"]||0,prev:prev["New Consultant Sign-ups"]||0,color:"#10b981",icon:"🎯"},
              {label:"Content Published",val:published,color:"#3b82f6",icon:"📤"},
              {label:"Blog Sessions",val:latest["Blog Sessions"]||0,prev:prev["Blog Sessions"]||0,color:"#06b6d4",icon:"📝"},
              {label:"Email Open Rate",val:latest["Email Open Rate %"]||0,unit:"%",target:30,color:"#f59e0b",icon:"📧"},
            ].map((kpi,i)=>{
              const up=kpi.prev!==undefined?kpi.val>=kpi.prev:null;
              const hitTarget=kpi.target!==undefined&&kpi.val>=kpi.target;
              return(
                <div key={kpi.label} className="card-hover" style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:"16px 18px",position:"relative",overflow:"hidden",animation:`fadeUp 0.4s ease ${i*0.07}s forwards`,opacity:0}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${kpi.color},transparent)`}}/>
                  {hitTarget&&<div style={{position:"absolute",top:10,right:10,fontSize:9,color:"#10b981",background:"#10b98118",padding:"2px 6px",borderRadius:4,border:"1px solid #10b98130"}}>✓ TARGET</div>}
                  <div style={{fontSize:10,color:"#374151",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:8}}>{kpi.icon} {kpi.label}</div>
                  <div style={{fontSize:28,fontWeight:700,color:"#f1f5f9",letterSpacing:"-0.5px",marginBottom:6}}>{kpi.val.toLocaleString()}<span style={{fontSize:13,color:"#374151"}}>{kpi.unit||""}</span></div>
                  {up!==null&&<div style={{fontSize:11,fontWeight:600,color:up?"#10b981":"#ef4444"}}>{up?"▲":"▼"} vs last week</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Middle row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
          {/* Pipeline */}
          <div className="card-hover" style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:18}}>
            <div style={{fontSize:12,fontWeight:600,color:"#f1f5f9",marginBottom:14}}>Content Pipeline</div>
            {[{l:"Published",v:published,c:"#059669"},{l:"Scheduled",v:scheduled,c:"#8b5cf6"},{l:"Approved",v:approved,c:"#10b981"},{l:"Needs Work",v:needsWork,c:"#f59e0b"}].map(s=>(
              <div key={s.l} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:"#4b5563"}}>{s.l}</span><span style={{fontSize:11,fontWeight:600,color:s.c}}>{s.v}</span></div>
                <div style={{height:3,borderRadius:2,background:"#111827"}}><div style={{height:"100%",borderRadius:2,background:s.c,width:`${content.length?s.v/content.length*100:0}%`,transition:"width 1s"}}/></div>
              </div>
            ))}
          </div>
          {/* Tasks */}
          <div className="card-hover" style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:18}}>
            <div style={{fontSize:12,fontWeight:600,color:"#f1f5f9",marginBottom:14}}>Active Tasks <span style={{color:"#f59e0b",marginLeft:4}}>{tasksDue}</span></div>
            {tasks.filter(r=>["Queued","In Progress"].includes(r.fields.Status)).slice(0,5).map(t=>(
              <div key={t.id} style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-start"}}>
                <div style={{width:5,height:5,borderRadius:"50%",marginTop:5,flexShrink:0,background:t.fields.Status==="In Progress"?"#f59e0b":"#374151",animation:t.fields.Status==="In Progress"?"pulse 2s infinite":"none"}}/>
                <div><div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4}}>{t.fields["Task Name"]?.slice(0,48)}</div><div style={{fontSize:9,color:"#374151"}}>{t.fields.Agent}</div></div>
              </div>
            ))}
            {tasksDue===0&&<div style={{fontSize:12,color:"#1f2937",textAlign:"center",paddingTop:16}}>All clear ✓</div>}
          </div>
          {/* Next up */}
          <div className="card-hover" style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:18}}>
            <div style={{fontSize:12,fontWeight:600,color:"#f1f5f9",marginBottom:14}}>Next Up</div>
            {pipeline.slice(0,5).map(item=>{
              const f=item.fields; const sc=STATUS_COLORS[f.Status]||"#4b5563";
              return(
                <div key={item.id} style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:13}}>{CH_ICONS[f["Content Type"]]||"📄"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4}}>{f["Content Title"]?.slice(0,44)}</div>
                    <div style={{display:"flex",gap:5,marginTop:2}}>
                      <span style={{fontSize:9,color:sc,background:`${sc}15`,padding:"1px 5px",borderRadius:3}}>{f.Status}</span>
                      {f["Publish Date"]&&<span style={{fontSize:9,color:"#374151",fontFamily:"'DM Mono',monospace"}}>{new Date(f["Publish Date"]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
            {pipeline.length===0&&<div style={{fontSize:11,color:"#1f2937",textAlign:"center",paddingTop:16}}>Generate a plan in CMO Agent</div>}
          </div>
        </div>

        {/* Agent cards */}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,color:"#374151",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12}}>Your Agent Team</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
            {agents.map((agent,i)=>(
              <div key={agent.id} className="agent-btn" onClick={()=>setActiveAgent(agent.id)} style={{background:"#0a0e1c",border:"1px solid #0d1525",borderRadius:12,padding:18,animation:`fadeUp 0.4s ease ${i*0.06}s forwards`,opacity:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{width:36,height:36,borderRadius:9,background:`${agent.color}15`,border:`1px solid ${agent.color}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{agent.icon}</div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:5,height:5,borderRadius:"50%",background:"#10b981",animation:"pulse 2s infinite"}}/><span style={{fontSize:9,color:"#10b981"}}>Online</span></div>
                </div>
                <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:3}}>{agent.name}</div>
                <div style={{fontSize:11,color:"#374151",marginBottom:10}}>{agent.desc}</div>
                <div style={{fontSize:10,color:agent.color,fontWeight:600}}>Open Agent -></div>
              </div>
            ))}
          </div>
        </div>

        {/* Weekly rhythm */}
        <div style={{background:"linear-gradient(135deg,rgba(59,130,246,0.06),rgba(6,182,212,0.04))",border:"1px solid rgba(59,130,246,0.12)",borderRadius:14,padding:"18px 22px"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#60a5fa",marginBottom:12}}>📍 Your Weekly Rhythm</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
            {[{day:"Monday",icon:"🧠",action:"CMO Agent generates plan"},{day:"Tue-Thu",icon:"✍️",action:"Writer Agent writes content"},{day:"Ongoing",icon:"📣",action:"Distribution publishes on schedule"},{day:"Friday",icon:"📊",action:"Log metrics -> get CEO report"},{day:"Weekend",icon:"🌙",action:"System runs itself. You rest."}].map(s=>(
              <div key={s.day} style={{textAlign:"center",padding:"10px 6px"}}>
                <div style={{fontSize:18,marginBottom:5}}>{s.icon}</div>
                <div style={{fontSize:10,fontWeight:600,color:"#60a5fa",marginBottom:3}}>{s.day}</div>
                <div style={{fontSize:10,color:"#374151",lineHeight:1.5}}>{s.action}</div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

// === APP ROOT ===
function App() {
  const [authed, setAuthed] = useState(()=> localStorage.getItem(STORAGE_KEY)==="1");
  if(!authed) return <PasswordScreen onAuth={()=>setAuthed(true)}/>;
  return <MasterDashboard onLogout={()=>{ localStorage.removeItem(STORAGE_KEY); setAuthed(false); }}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
