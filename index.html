/* Pre-React splash — visible instantly, hidden once React mounts */
#splash{
  position:fixed;inset:0;background:#04060e;

@keyframes splashFill{from{width:0}to{width:100%}}

/* ── ANIMATIONS ───────────────────────────────────────────────────── */

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── UTILITY CLASSES ──────────────────────────────────────────────── */

<script>
  // Hide splash once React has rendered something into #root
  (function() {
    var splash = document.getElementById('splash');
    var observer = new MutationObserver(function() {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        splash.classList.add('hidden');
        setTimeout(function(){ splash.style.display='none'; }, 350);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    // Fallback: hide after 8s no matter what
    setTimeout(function(){ splash.style.display='none'; }, 8000);
  })();
</script>

/* ── DEFAULT SETTINGS ─────────────────────────────────────────────── */

/* ── SAFE LOCALSTORAGE ───────────────────────────────────────────── */
function lsGet(key, fallback = null) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null || raw === undefined) return fallback;
    return JSON.parse(raw);
  } catch (_) {
    return fallback;
  }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (_) {}
}
function lsDel(key) {
  try { localStorage.removeItem(key); } catch (_) {}
}

/* ── SETTINGS HELPERS ─────────────────────────────────────────────── */
function loadSettings() {
  const saved = lsGet(K_SETTINGS, {});
  return { ...DEFAULTS, ...saved };
}
function saveSettings(s) {
  const { password: _pw, ...rest } = s;
  lsSet(K_SETTINGS, rest);
  if (_pw && _pw.trim()) lsSet(K_PW, _pw.trim());
  sbPush("settings", rest); // background sync
}
function getCorrectPassword() {
  // Priority: saved pw override > default
  return lsGet(K_PW, null) || DEFAULTS.password;
}

/* ── HISTORY HELPERS ──────────────────────────────────────────────── */
const MAX_HISTORY = 500;
function loadHistory() { return lsGet(K_HISTORY, []); }
function appendHistory(concepts) {
  const prev = loadHistory();
  const toAdd = concepts.map(c => ({
    id:       c.id,
    title:    c.title   || "",
    hook:     c.hook    || "",
    angle:    c.angle   || "",
    platform: c.platform|| "",
    date:     todayStr(),
  }));
  const merged = [...toAdd, ...prev].slice(0, MAX_HISTORY);
  lsSet(K_HISTORY, merged);
  sbPush("history", merged);
}
function clearHistory() {
  lsDel(K_HISTORY); lsDel(K_DAILY);
  sbPush("history", []);
  sbPush("daily", {});
}

/* ── THEME HELPERS ────────────────────────────────────────────────── */
function loadThemes() { return lsGet(K_THEMES, []); }
function saveThemes(t) { lsSet(K_THEMES, t); sbPush("themes", t); }

/* ── CHARACTER HELPERS ────────────────────────────────────────────── */
function loadCharacters() { return lsGet(K_CHARACTERS, []); }
function saveCharacters(c) { lsSet(K_CHARACTERS, c); sbPush("characters", c); }
function getDefaultCharacter() {
  const chars = loadCharacters();
  return chars.find(c => c.isDefault) || chars[0] || null;
}

/* ── VIDEO JOB HELPERS ────────────────────────────────────────────── */
function loadVideoJobs() {
  const jobs = lsGet(K_VIDEOJOBS, []);
  // Normalize: HeyGen sometimes returns error as an object {code, message, detail}
  // React can't render objects as children, so we always coerce to string here
  return jobs.map(j => {
    if (j.error && typeof j.error === "object") {
      return { ...j, error: j.error.detail || j.error.message || JSON.stringify(j.error) };
    }
    return j;
  });
}
function saveVideoJobs(jobs) { lsSet(K_VIDEOJOBS, jobs); sbPush("videojobs", jobs); }
function appendVideoJob(job) {
  const prev = loadVideoJobs();
  const updated = [job, ...prev].slice(0, 200);
  lsSet(K_VIDEOJOBS, updated);
  sbPush("videojobs", updated);
}
function updateVideoJob(id, patch) {
  const prev = loadVideoJobs();
  const updated = prev.map(j => j.id === id ? { ...j, ...patch } : j);
  lsSet(K_VIDEOJOBS, updated);
  sbPush("videojobs", updated);
  return updated;
}

/* ── DATE HELPERS ─────────────────────────────────────────────────── */
function todayStr() { return new Date().toISOString().slice(0, 10); }
function niceDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric"
  });
}
function uid() { return Math.random().toString(36).slice(2, 9); }

/* ── SUPABASE SYNC LAYER ──────────────────────────────────────────────
   Single table approach: fcr_store (id text PK, data jsonb, updated_at timestamptz)
   All app data stored as JSON blobs keyed by logical name.
   Anon key is safe to expose publicly — RLS keeps it scoped.
   ──────────────────────────────────────────────────────────────────── */
function _sbCfg() {
  const s = lsGet(K_SETTINGS, {});
  return { url: (s.supabaseUrl || "").replace(/\/$/, ""), key: (s.supabaseAnonKey || "") };
}
function sbReady() { const c = _sbCfg(); return !!(c.url && c.key); }

async function sbPush(id, data) {
  if (!sbReady()) return;
  const { url, key } = _sbCfg();
  try {
    await fetch(`${url}/rest/v1/fcr_store`, {
      method: "POST",
      headers: {
        "apikey": key, "Authorization": `Bearer ${key}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal",
      },
      body: JSON.stringify({ id, data, updated_at: new Date().toISOString() }),
    });
  } catch (_) {}
}

async function sbPull(id) {
  if (!sbReady()) return null;
  const { url, key } = _sbCfg();
  try {
    const res = await fetch(`${url}/rest/v1/fcr_store?id=eq.${id}&select=data`, {
      headers: { "apikey": key, "Authorization": `Bearer ${key}` },
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows?.[0]?.data ?? null;
  } catch (_) { return null; }
}

// Pull all data from Supabase → populate localStorage (called on app load)
async function syncFromSupabase() {
  // Use hardcoded DEFAULTS for Supabase creds if localStorage doesn't have them yet
  const stored = lsGet(K_SETTINGS, {});
  const supabaseUrl     = (stored.supabaseUrl     || DEFAULTS.supabaseUrl    || "").replace(/\/$/, "");
  const supabaseAnonKey =  stored.supabaseAnonKey || DEFAULTS.supabaseAnonKey || "";
  if (!supabaseUrl || !supabaseAnonKey) return { ok: false, reason: "not_configured" };
  try {
    const res = await fetch(`${supabaseUrl}/rest/v1/fcr_store?select=id,data`, {
      headers: { "apikey": supabaseAnonKey, "Authorization": `Bearer ${supabaseAnonKey}` },
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => "");
      return { ok: false, reason: `HTTP ${res.status}: ${txt.slice(0, 100)}` };
    }
    const rows = await res.json();
    const MAP = {
      settings:   K_SETTINGS,
      characters: K_CHARACTERS,
      history:    K_HISTORY,
      daily:      K_DAILY,
      videojobs:  K_VIDEOJOBS,
      themes:     K_THEMES,
    };
    rows.forEach(r => {
      if (!MAP[r.id] || r.data === null) return;
      if (r.id === "settings") {
        // Merge pulled settings with DEFAULTS — hardcoded Supabase creds always win
        const merged = { ...DEFAULTS, ...r.data, supabaseUrl: DEFAULTS.supabaseUrl, supabaseAnonKey: DEFAULTS.supabaseAnonKey };
        lsSet(K_SETTINGS, merged);
      } else {
        lsSet(MAP[r.id], r.data);
      }
    });
    return { ok: true };
  } catch (e) {
    return { ok: false, reason: e.message };
  }
}

// Push everything local → Supabase (manual "push" from Settings)
async function pushAllToSupabase() {
  if (!sbReady()) return { ok: false, reason: "not_configured" };
  try {
    await Promise.all([
      sbPush("settings",   lsGet(K_SETTINGS,   {})),
      sbPush("characters", lsGet(K_CHARACTERS, [])),
      sbPush("history",    lsGet(K_HISTORY,    [])),
      sbPush("daily",      lsGet(K_DAILY,      {})),
      sbPush("videojobs",  lsGet(K_VIDEOJOBS,  [])),
      sbPush("themes",     lsGet(K_THEMES,     [])),
    ]);
    return { ok: true };
  } catch (e) {
    return { ok: false, reason: e.message };
  }
}

// Test connection — returns { ok, reason }
async function testSupabaseConnection() {
  if (!sbReady()) return { ok: false, reason: "Enter URL and Anon Key first." };
  const { url, key } = _sbCfg();
  try {
    const res = await fetch(`${url}/rest/v1/fcr_store?limit=1`, {
      headers: { "apikey": key, "Authorization": `Bearer ${key}` },
    });
    if (res.ok) return { ok: true };
    const txt = await res.text().catch(() => "");
    if (res.status === 404) return { ok: false, reason: "Table 'fcr_store' not found. Run the SQL setup." };
    return { ok: false, reason: `HTTP ${res.status}: ${txt.slice(0, 120)}` };
  } catch (e) {
    return { ok: false, reason: "Network error: " + e.message };
  }
}

// Submit image-to-video. base64Data = full data URI. Returns { name: "operations/..." }
async function callVeoImageToVideo(base64Data, mimeType, prompt, geminiKey) {
  const raw = base64Data.replace(/^data:[^;]+;base64,/, "");
  const url = `https://generativelanguage.googleapis.com/v1beta/models/veo-3.1-generate-preview:predictLongRunning?key=${encodeURIComponent(geminiKey)}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      instances: [{
        prompt,
        image: { bytesBase64Encoded: raw, mimeType: mimeType || "image/jpeg" }
      }],
      parameters: {
        aspectRatio:      "9:16",
        durationSeconds:  8,
        resolution:       "1080p",
        personGeneration: "allow_adult",
      }
    })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data?.error?.message || JSON.stringify(data).slice(0, 300);
    throw new Error(`Veo error: ${msg}`);
  }
  if (!data.name) throw new Error("Veo did not return an operation name.");
  return data;
}

// Poll a Veo operation. When done: .response.generatedVideos[0].video.uri
async function checkVeoOperation(operationName, geminiKey) {
  const url = `https://generativelanguage.googleapis.com/v1beta/${operationName}?key=${encodeURIComponent(geminiKey)}`;
  const res = await fetch(url);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(`Veo poll HTTP ${res.status}`);
  return data;
}

// Fetch a Gemini Files URI as a blob URL for browser playback / download.
async function fetchVeoVideoBlob(fileUri, geminiKey) {
  // URI may already contain ?alt=media — append key correctly
  const sep = fileUri.includes("?") ? "&" : "?";
  const baseUri = fileUri.includes("alt=media") ? fileUri : `${fileUri}${sep}alt=media`;
  const url = `${baseUri}${baseUri.includes("?") ? "&" : "?"}key=${encodeURIComponent(geminiKey)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Video fetch HTTP ${res.status} — file may have expired (48h limit)`);
  const blob = await res.blob();
  return URL.createObjectURL(blob);
}

/* ── HEYGEN API ─────────────────────────────────────────────────── */
async function heygenListAvatars(apiKey) {

// Build HeyGen video_inputs from concept scenes (multi-cut influencer style)
// Only uses fields confirmed in HeyGen v2 API docs: type, avatar_id, avatar_style,
// input_text, voice_id, and background color. No undocumented scale/offset/speed.
function buildHeygenVideoInputs(avatarId, scenes, voiceId) {
  return scenes.map(scene => {
    const item = {
      character: {
        type:         "avatar",
        avatar_id:    avatarId,
        avatar_style: "normal",
      },
      voice: {
        type:       "text",
        input_text: scene.script,
        voice_id:   voiceId,
      },
    };
    // Only add background if we have a valid hex color
    if (scene.backgroundHex && /^#[0-9A-Fa-f]{6}$/.test(scene.backgroundHex)) {
      item.background = { type: "color", value: scene.backgroundHex };
    }
    return item;
  });
}

async function heygenGenerateVideo(avatarId, scenes, voiceId, apiKey) {
  // scenes: array from concept.scenes — each one becomes a cut in the video
  const video_inputs = buildHeygenVideoInputs(avatarId, scenes, voiceId);
  const res = await fetch("https://api.heygen.com/v2/video/generate", {
    method: "POST",
    headers: { "X-Api-Key": apiKey, "Content-Type": "application/json" },
    body: JSON.stringify({
      video_inputs,
      dimension: { width: 1080, height: 1920 },
    })
  });
  const data = await res.json();
  console.log("[HeyGen generate]", res.status, JSON.stringify(data));
  if (!res.ok) throw new Error(data?.message || data?.error?.message || `HeyGen HTTP ${res.status}`);
  if (!data?.data?.video_id) throw new Error("HeyGen did not return a video_id. Response: " + JSON.stringify(data).slice(0,300));
  return data.data.video_id;
}

async function heygenGetVideoStatus(videoId, apiKey) {
  const res = await fetch(`https://api.heygen.com/v1/video_status.get?video_id=${videoId}`, {
    headers: { "X-Api-Key": apiKey }
  });
  const data = await res.json();
  console.log("[HeyGen status]", videoId, res.status, data?.data?.status);
  if (!res.ok) throw new Error(data?.message || `HeyGen status HTTP ${res.status}`);
  // data.data: { status, video_url, error, duration, ... }
  return data?.data || {};
}

/* ════════════════════════════════════════════════════════
   CREATIFY API — routed through /api/creatify Vercel proxy
   to bypass browser CORS restrictions.
   ════════════════════════════════════════════════════════ */
function creatifyHeaders(apiId, apiKey) {
  return { "Content-Type": "application/json", "X-API-ID": apiId, "X-API-KEY": apiKey };
}

// Always call via the Vercel proxy at /api/creatify?path=...
const CREATIFY_PROXY = "/api/creatify";

async function creatifyListAvatars(apiId, apiKey) {
  const res  = await fetch(`${CREATIFY_PROXY}?path=/api/personas/`, { headers: creatifyHeaders(apiId, apiKey) });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.message || `Creatify avatars HTTP ${res.status}`);
  return Array.isArray(data) ? data : (data.results || data.data || []);
}

async function creatifyGenerateVideo(creatorId, script, apiId, apiKey) {
  const body = {
    text:          script,
    creator:       creatorId,
    aspect_ratio:  "9:16",
    model_version: "aurora_v1_fast",
  };
  const res  = await fetch(`${CREATIFY_PROXY}?path=/api/lipsyncs/`, {
    method:  "POST",
    headers: creatifyHeaders(apiId, apiKey),
    body:    JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.message || data?.detail || `Creatify generate HTTP ${res.status}`);
  if (!data.id) throw new Error("Creatify did not return a job ID");
  return data.id;
}

async function creatifyGetStatus(jobId, apiId, apiKey) {
  const res  = await fetch(`${CREATIFY_PROXY}?path=/api/lipsyncs/${jobId}/`, {
    headers: creatifyHeaders(apiId, apiKey),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.message || data?.detail || `Creatify status HTTP ${res.status}`);
  // data.status: "pending" | "processing" | "done" | "failed"
  // data.output: video URL when done
  return data;
}

async function generateUGCScript(concept, charDesc, settings) {
  // If concept already has scenes, we DON'T need Gemini — the scenes ARE the scripts.
  // This function now returns the scenes array for HeyGen.
  // If no scenes (legacy concept), fall back to generating a monolithic script as a single scene.
  if (concept.scenes && concept.scenes.length > 0) {
    return concept.scenes; // already structured for HeyGen
  }
  // Legacy fallback: generate monolithic script and wrap as one scene
  const sys = `You are a UGC ad scriptwriter. Write a natural, conversational speaking script for a social media video ad.
The script must sound like a real person talking directly to camera — no emojis, no hashtags, no stage directions.
Output ONLY the spoken words, nothing else. 60-90 seconds at a natural pace (~130 words per minute).
Product: ${settings.productName} — ${settings.productTagline}
${settings.productDesc}
Brand voice: ${settings.brandVoice}`;
  const usr = `Write the spoken script for:
Title: ${concept.title}
Hook: ${concept.hook}
${concept.script ? "Concept script: " + JSON.stringify(concept.script) : ""}
Target audience: ${settings.targetAudience}
End with a CTA to visit ${settings.websiteUrl}.`;
  const monologue = await callGemini(sys, usr, 1024);
  // Return as a single scene
  return [{ label: "Full Video", script: monologue, backgroundHex: "#111827", avatarScale: 0.7, voiceSpeed: 1.0 }];
}

/* ── GEMINI API ───────────────────────────────────────────────────── */
async function callGemini(systemPrompt, userPrompt, maxTokens = 8192) {
  const key = loadSettings().geminiApiKey;
  if (!key || !key.trim()) throw new Error("No Gemini API key. Add it in ⚙️ Settings → AI.");
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`;
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: "user", parts: [{ text: userPrompt }] }],
    generationConfig: { maxOutputTokens: maxTokens, temperature: 1.0 }
  };
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errTxt = await res.text().catch(() => "");
    throw new Error(`Gemini HTTP ${res.status}: ${errTxt.slice(0, 200)}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(`Gemini Error: ${data.error.message || JSON.stringify(data.error)}`);
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("Gemini returned empty response. Please try again.");
  return text;
}

async function callOpenAIText(systemPrompt, userPrompt, maxTokens = 8192) {
  const key = loadSettings().openaiApiKey;
  if (!key || !key.trim()) throw new Error("No OpenAI API key. Add it in ⚙️ Settings.");
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key.trim()}` },
    body: JSON.stringify({
      model: "gpt-4o",
      max_tokens: maxTokens,
      temperature: 1.0,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: userPrompt }
      ]
    })
  });
  if (!res.ok) {
    const errTxt = await res.text().catch(() => "");
    throw new Error(`OpenAI HTTP ${res.status}: ${errTxt.slice(0, 200)}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(`OpenAI Error: ${data.error.message || JSON.stringify(data.error)}`);
  const text = data?.choices?.[0]?.message?.content;
  if (!text) throw new Error("OpenAI returned empty response. Please try again.");
  return text;
}

async function callClaudeText(systemPrompt, userPrompt, maxTokens = 4096) {
  maxTokens = Math.min(maxTokens, 4096);
  const key = loadSettings().claudeApiKey;
  if (!key || !key.trim()) throw new Error("No Claude API key. Add it in Settings.");
  const body = { model: "claude-haiku-4-5-20251001", max_tokens: maxTokens, messages: [{ role: "user", content: String(userPrompt || "").slice(0, 50000) }] };
  if (systemPrompt) body.system = String(systemPrompt).slice(0, 10000);
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key.trim(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify(body)
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = json?.error?.message || JSON.stringify(json).slice(0, 300);
    console.error("Claude error:", json);
    throw new Error("Claude " + res.status + ": " + msg);
  }
  const text = json?.content?.[0]?.text;
  if (!text) throw new Error("Claude returned empty response.");
  return text;
}

async function callAI(provider, systemPrompt, userPrompt, maxTokens = 8192) {
  if (provider === "openai") return callOpenAIText(systemPrompt, userPrompt, maxTokens);
  if (provider === "claude") return callClaudeText(systemPrompt, userPrompt, maxTokens);
  return callGemini(systemPrompt, userPrompt, maxTokens);
}

/* ── ROBUST JSON ARRAY EXTRACTOR ──────────────────────────────────── */
// Extracts a JSON array from AI text that may have markdown fences or extra prose
function extractJSONArray(rawText) {
  if (!rawText || typeof rawText !== "string") throw new Error("Empty AI response.");
  // Strip markdown code fences
  let t = rawText
    .replace(/```json\s*/gi, "")
    .replace(/```\s*/g, "")
    .trim();

  // Find the outermost [ ... ]
  const start = t.indexOf("[");
  const end   = t.lastIndexOf("]");
  if (start === -1) throw new Error("AI response did not contain a JSON array. Raw preview: " + t.slice(0, 120));

  // If no closing bracket (truncated response), try to close it
  let jsonStr = end > start ? t.slice(start, end + 1) : t.slice(start);

  // Fix: replace raw control characters inside JSON strings (common Gemini issue)
  function fixControlChars(src) {
    let out = ""; let inString = false; let i = 0;
    while (i < src.length) {
      const ch = src[i];
      if (inString && ch === "\\") { out += ch; i++; if (i < src.length) { out += src[i]; i++; } continue; }
      if (ch === '"') { inString = !inString; out += ch; i++; continue; }
      if (inString) {
        const code = ch.charCodeAt(0);
        if (code < 0x20) {
          if (code === 10) out += "\\n"; else if (code === 13) out += "\\r"; else if (code === 9) out += "\\t"; else out += " ";
        } else { out += ch; }
      } else { out += ch; }
      i++;
    }
    return out;
  }

  const fixed = fixControlChars(jsonStr);

  // 1. Try clean parse
  try { const r = JSON.parse(fixed); if (Array.isArray(r)) return r; } catch (_) {}
  try { const r = JSON.parse(jsonStr); if (Array.isArray(r)) return r; } catch (_) {}

  // 2. Response may be truncated — try to recover complete objects from partial array
  // Strategy: extract all complete {...} objects within the array
  function extractCompleteObjects(src) {
    const results = [];
    let depth = 0; let objStart = -1; let inStr = false;
    for (let i = 0; i < src.length; i++) {
      const ch = src[i];
      // Track strings
      if (ch === '"' && (i === 0 || src[i-1] !== '\\')) { inStr = !inStr; }
      if (inStr) continue;
      if (ch === '{') {
        if (depth === 0) objStart = i;
        depth++;
      } else if (ch === '}') {
        depth--;
        if (depth === 0 && objStart !== -1) {
          const candidate = src.slice(objStart, i + 1);
          const candidateFixed = fixControlChars(candidate);
          try {
            const parsed = JSON.parse(candidateFixed);
            if (parsed && typeof parsed === "object") results.push(parsed);
          } catch (_) {}
          objStart = -1;
        }
      }
    }
    return results;
  }

  const recovered = extractCompleteObjects(fixed.length > jsonStr.length ? fixed : jsonStr);
  if (recovered.length > 0) return recovered;

  throw new Error("JSON parse failed — AI response may have been truncated. Please try again.");
}

/* ── COPY BUTTON ─────────────────────────────────────────────────── */
function CopyButton({ text, label = "Copy Script" }) {
  const [done, setDone] = useState(false);
  function handle() {
    if (!text) return;
    try {
      navigator.clipboard.writeText(text).then(() => {
        setDone(true);
        setTimeout(() => setDone(false), 2000);
      }).catch(() => {
        // Fallback for browsers that restrict clipboard API
        const el = document.createElement("textarea");
        el.value = text;
        el.style.position = "fixed";
        el.style.opacity = "0";
        document.body.appendChild(el);
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        setDone(true);
        setTimeout(() => setDone(false), 2000);
      });
    } catch (_) {}
  }
  return (
    <button onClick={handle} className="btn-ghost" style={{
      background: "#0b1020", border: "1px solid #1a2540",
      borderRadius: 7, padding: "7px 14px",
      color: done ? "#10b981" : "#94a3b8",
      fontSize: 11, fontWeight: 600, cursor: "pointer",
      display: "flex", alignItems: "center", gap: 5,
      transition: "all 0.15s",
    }}>
      {done ? "✓ Copied!" : `📋 ${label}`}
    </button>
  );
}

/* ════════════════════════════════════════════════════════════════════
   VIDEO ANALYZER COMPONENT
   Analyzes TikTok / Instagram Reel / YouTube Shorts URLs with Gemini.
   • YouTube: uses Gemini's native video file support (fileData API)
   • TikTok:  fetches oEmbed metadata, then text-analyzes
   • Instagram: text-analyzes from URL context
   ════════════════════════════════════════════════════════════════════ */

// Detect platform from URL
function detectPlatform(url) {
  const u = url.toLowerCase();
  if (u.includes("youtube.com") || u.includes("youtu.be"))  return "youtube";
  if (u.includes("tiktok.com"))                              return "tiktok";
  if (u.includes("instagram.com"))                           return "instagram";
  return null;
}

// Fetch TikTok oEmbed (public, no auth)
async function fetchTikTokMeta(url) {
  try {
    const r = await fetch(`https://www.tiktok.com/oembed?url=${encodeURIComponent(url)}`);
    if (!r.ok) return null;
    return await r.json();
  } catch (_) { return null; }
}

// Call Gemini with YouTube video file inline
async function callGeminiWithVideo(videoUrl, textPrompt, maxTokens = 6000) {
  const key = loadSettings().geminiApiKey;
  if (!key || !key.trim()) throw new Error("No Gemini API key set.");
  const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`;
  const body = {
    contents: [{
      role: "user",
      parts: [
        { fileData: { fileUri: videoUrl, mimeType: "video/mp4" } },
        { text: textPrompt }
      ]
    }],
    generationConfig: { maxOutputTokens: maxTokens, temperature: 0.9 }
  };
  const res = await fetch(apiUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const t = await res.text().catch(() => "");
    throw new Error(`Gemini HTTP ${res.status}: ${t.slice(0, 200)}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("Gemini returned empty response.");
  return text;
}

// Extract JSON object from AI text
function extractJSONObject(rawText) {
  if (!rawText) throw new Error("Empty response.");
  let t = rawText.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  const start = t.indexOf("{");
  const end   = t.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("No JSON object found.");
  t = t.slice(start, end + 1);
  // Fix control chars
  let out = ""; let inStr = false; let i = 0;
  while (i < t.length) {
    const ch = t[i];
    if (inStr && ch === "\\") { out += ch; i++; if (i < t.length) { out += t[i]; i++; } continue; }
    if (ch === '"') { inStr = !inStr; out += ch; i++; continue; }
    if (inStr) {
      const code = ch.charCodeAt(0);
      if (code < 0x20) {
        if (code === 10) out += "\\n"; else if (code === 13) out += "\\r"; else if (code === 9) out += "\\t"; else out += " ";
      } else { out += ch; }
    } else { out += ch; }
    i++;
  }
  try { return JSON.parse(out); } catch (_) {}
  try { return JSON.parse(t); } catch (e) { throw new Error("Parse failed: " + e.message); }
}

// The full VideoAnalyzer component
function VideoAnalyzer({ onGenerateFromAnalysis }) {
  const [url, setUrl]               = useState("");
  const [analyzing, setAnalyzing]   = useState(false);
  const [stage, setStage]           = useState("");
  const [analysis, setAnalysis]     = useState(null);
  const [platform, setPlatform]     = useState(null);
  const [error, setError]           = useState(null);
  const [genLoading, setGenLoading]       = useState(false);
  const [vaConceptCount, setVaConceptCount] = useState(10);
  const [vaPlatforms, setVaPlatforms]       = useState(["Instagram Reel", "TikTok Video"]);
  const [vaFocus, setVaFocus]               = useState("");

  function handleUrlChange(e) {
    setUrl(e.target.value);
    setAnalysis(null);
    setError(null);
    setPlatform(detectPlatform(e.target.value));
  }

  const ANALYSIS_PROMPT = `You are an expert viral short-form video strategist.
Analyze this video and explain WHY it likely performed well.
Do NOT summarize the plot or captions. Focus ONLY on the mechanics that drive retention, watch time, shares, and views.

Return ONLY a valid JSON object with this exact structure:
{
  "videoTitle": "inferred title or description of the video",
  "estimatedPerformance": "brief note on why this type of video tends to perform well",
  "hook": {
    "description": "what the hook is in the first 3 seconds",
    "whyItWorks": "specific reason this hook stops the scroll",
    "psychologicalTrigger": "the exact psychological trigger used (e.g. curiosity gap, fear of missing out, social proof, surprise, identity, controversy)"
  },
  "visualTechniques": [
    "specific visual element: camera movement / facial expression / text / props / transitions / colors / B-roll — and how it supports retention or clarity"
  ],
  "audioChoices": {
    "analysis": "voice tone, pacing, music, sound effects and how they boost engagement or emotion"
  },
  "pacingAndEditing": {
    "analysis": "speed of cuts, pattern interrupts, zooms, retention spikes and how these keep people watching"
  },
  "emotionalDrivers": [
    "emotion triggered (humor / curiosity / relatability / tension / etc.) and how it increases shares or replays"
  ],
  "rewatchabilityTriggers": [
    "specific element that prompts a replay — fast visuals, hidden details, surprises, etc."
  ],
  "viralSummary": [
    "top reason 1 this video likely performed well — direct and actionable",
    "top reason 2",
    "top reason 3",
    "top reason 4",
    "top reason 5",
    "top reason 6",
    "top reason 7"
  ]
}`;

  async function analyze() {
    if (!url.trim() || analyzing) return;
    const p = detectPlatform(url.trim());
    if (!p) {
      setError("Please enter a valid TikTok, Instagram Reel, or YouTube URL.");
      return;
    }
    setAnalyzing(true);
    setAnalysis(null);
    setError(null);
    setPlatform(p);

    try {
      let rawText = "";

      if (p === "youtube") {
        // YouTube: Gemini can process YouTube URLs natively
        setStage("Loading YouTube video into Gemini…");
        rawText = await callGeminiWithVideo(url.trim(), ANALYSIS_PROMPT, 6000);

      } else {
        // TikTok / Instagram: text-based analysis using URL + metadata
        let metaContext = "";

        if (p === "tiktok") {
          setStage("Fetching TikTok metadata…");
          const meta = await fetchTikTokMeta(url.trim());
          if (meta) {
            metaContext = `
VIDEO METADATA FROM TIKTOK:
- Title/Caption: ${meta.title || "Not available"}
- Author: ${meta.author_name || "Unknown"}
- Thumbnail: Available
`;
          }
        }

        setStage("Analyzing with AI…");
        const contextPrompt = `I am sharing a ${p === "tiktok" ? "TikTok" : "Instagram Reel"} video URL for analysis.
URL: ${url.trim()}
${metaContext}

Based on this URL, any available metadata, and your knowledge of viral ${p === "tiktok" ? "TikTok" : "Instagram Reel"} content patterns, perform a deep viral performance analysis.
If you cannot directly access the video, analyze based on the URL structure, any title/metadata provided, and common patterns for high-performing ${p === "tiktok" ? "TikTok" : "Instagram Reel"} content in this niche.
Be specific and actionable — assume the video is a high-performer in its category.

${ANALYSIS_PROMPT}`;
        rawText = await callGemini(
          "You are an expert viral video strategist who deeply understands TikTok and Instagram Reel algorithms.",
          contextPrompt,
          6000
        );
      }

      setStage("Parsing analysis…");
      const parsed = extractJSONObject(rawText);
      setAnalysis(parsed);

    } catch (err) {
      setError(err?.message || "Analysis failed. Please try again.");
    } finally {
      setAnalyzing(false);
      setStage("");
    }
  }

  async function generateInspiredConcepts() {
    if (!analysis || genLoading) return;
    setGenLoading(true);
    try {
      await onGenerateFromAnalysis(analysis, { conceptCount: vaConceptCount, platforms: vaPlatforms, focus: vaFocus });

      setGenLoading(false);
    }
  }

  const PLATFORM_INFO = {
    youtube:   { icon: "▶️", label: "YouTube Shorts", color: "#ff0000" },

function GeneratorPage() {
  const [genMode, setGenMode]       = useState("generate"); // "generate" | "analyze"
  const [focus, setFocus]           = useState("");
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress]     = useState("");
  const [concepts, setConcepts]     = useState([]);
  const [toast, setToast]           = useState(null);
  const [hasKey, setHasKey]         = useState(false);
  const [aiProvider, setAiProvider] = useState("gemini"); // "gemini" | "openai"
  // ── NEW: Themes, platforms, count ─────────────────────────────────
  const [selectedPlatforms, setSelectedPlatforms] = useState(["Instagram Reel", "TikTok Video"]);
  const [conceptCount, setConceptCount]           = useState(1);
  const [selectedTheme, setSelectedTheme]         = useState("default");
  const [themes, setThemes]                       = useState(() => loadThemes());

  // Toast helper — stable across renders
  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3800);
  }, []);

  // On mount: check API key, load today's cached concepts
  useEffect(() => {
    const s = loadSettings();
    setHasKey(Boolean((s.geminiApiKey && s.geminiApiKey.trim()) || (s.openaiApiKey && s.openaiApiKey.trim()) || (s.claudeApiKey && s.claudeApiKey.trim())));
    const daily = lsGet(K_DAILY, null);
    if (daily && daily.date === todayStr() && Array.isArray(daily.concepts) && daily.concepts.length > 0) {
      setConcepts(daily.concepts);
    }
  }, []);

  // Distribute concepts evenly across selected platforms
  function distributePlatforms(platforms, total) {
    if (!platforms.length) return [["Instagram Reel", total]];
    const base = Math.floor(total / platforms.length);
    const rem  = total % platforms.length;
    return platforms.map((p, i) => [p, base + (i < rem ? 1 : 0)]);
  }

  function togglePlatform(p) {
    setSelectedPlatforms(prev =>
      prev.includes(p)
        ? prev.length > 1 ? prev.filter(x => x !== p) : prev // keep at least 1
        : [...prev, p]
    );
  }

  async function generate() {
    if (generating) return;
    const s = loadSettings();
    if (!s.geminiApiKey || !s.geminiApiKey.trim()) {
      showToast(`Add your ${aiProvider === "claude" ? "Claude" : "Gemini"} API key in ⚙️ Settings first.`, "error");
      return;
    }
    if (selectedPlatforms.length === 0) {
      showToast("Select at least one platform.", "error");
      return;
    }

    setGenerating(true);
    setConcepts([]);
    setProgress("Reading brand context...");

    try {
      const history    = loadHistory();
      const recentPrev = history.slice(0, 70);
      const prevList   = recentPrev.length > 0
        ? recentPrev.map((h, i) =>
            `${i + 1}. [${h.platform}] "${h.title}" — Angle: ${h.angle} — Hook: "${h.hook}"`
          ).join("\n")
        : "None — this is the first generation!";

      setProgress(`Generating ${conceptCount} unique concepts...`);

      const systemPrompt = buildBrandContext();

      // Theme context
      const theme      = themes.find(t => t.id === selectedTheme);
      const themeBlock = theme
        ? `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
CONTENT THEME: ${theme.name} ${theme.emoji}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${theme.promptInstructions}

ALL ${conceptCount} CONCEPTS MUST follow this theme's style, tone, and format.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`
        : "";

      // Platform distribution
      const dist       = distributePlatforms(selectedPlatforms, conceptCount);
      const platformStr = dist.map(([p, n]) => `${n} ${p}${n > 1 ? "s" : ""}`).join(" + ");
      const platformSeq = dist.flatMap(([p, n]) => Array(n).fill(p));

      // Angle assignments cycling through ANGLES array
      const angleAssignments = platformSeq.map((_, i) =>
        `Concept ${i + 1} [${platformSeq[i]}]: ${ANGLES[i % ANGLES.length]}`
      ).join("\n");

      const userPrompt = `Generate EXACTLY ${conceptCount} unique short-form video concepts for TODAY.
Platform distribution: ${platformStr}
${themeBlock}
${focus.trim() ? `TODAY'S BRIEF / FOCUS:\n${focus.trim()}\n` : "No specific brief — create diverse, evergreen content.\n"}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PREVIOUSLY USED CONCEPTS — DO NOT REPEAT:
(These have already been made. Choose completely fresh angles, hooks, titles, and ideas.)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${prevList}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PLATFORM + ANGLE ASSIGNMENTS (follow exactly):
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${angleAssignments}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SCRIPT RULES — READ THESE CAREFULLY:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Every script is spoken by a real person to camera. It must sound like a voice memo, not a marketing email.

Hook (0–3s): 1 sentence. 8 words MAX. Stops the scroll immediately. Use a statement that makes someone pause mid-swipe. NOT a question. A bold claim or specific situation they recognize instantly.

Good hooks: "I blocked a client last month." / "My fully booked calendar was a trap." / "I turned down $10k and it was the right call."
Bad hooks: "Are you struggling to grow your coaching business?" / "Here's what no one tells you about pricing."

Body (3–40s): Tell the story. SHORT sentences. One idea per sentence. Build tension — the problem should feel real and specific before the solution shows up. Use real details: dollar amounts, time frames, names of situations. Never explain what you're about to say — just say it.

CTA (40–50s): One sentence. Soft. Human. NOT "follow me" or "like this video". Ask a question they'll answer in their head, or tell them the one thing to do next.

SCENE STRUCTURE:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Write 4–5 scenes. Each scene = one emotional beat in the story. They must flow into each other naturally when read aloud back-to-back with no gaps.

      // Strips characters that break prompt injection: quotes, backticks,
      // raw newlines (replaced with space), pipe chars. Truncates to maxLen.
      function safe(val, maxLen = 180) {
        if (!val) return "";
        return String(val)
          .replace(/["`]/g, "'")          // replace double-quotes & backticks
          .replace(/[\r\n]+/g, " ")       // flatten newlines to space
          .replace(/\s{2,}/g, " ")        // collapse multiple spaces
          .trim()
          .slice(0, maxLen);
      }
      function safeList(arr, maxItems = 4, maxLen = 140) {
        if (!Array.isArray(arr)) return "";
        return arr.slice(0, maxItems).map(x => safe(x, maxLen)).join("; ");
      }

      // ── BUILD CLEAN VIRAL INSIGHT BLOCK ────────────────────────────
      const insights = [
        analysis.hook?.psychologicalTrigger && `Hook trigger: ${safe(analysis.hook.psychologicalTrigger, 100)}`,
        analysis.hook?.description          && `Hook pattern: ${safe(analysis.hook.description, 150)}`,
        analysis.hook?.whyItWorks           && `Why it works: ${safe(analysis.hook.whyItWorks, 150)}`,
        analysis.visualTechniques?.length   && `Visuals: ${safeList(analysis.visualTechniques, 3)}`,
        analysis.audioChoices?.analysis     && `Audio: ${safe(analysis.audioChoices.analysis, 130)}`,
        analysis.pacingAndEditing?.analysis && `Pacing: ${safe(analysis.pacingAndEditing.analysis, 130)}`,
        analysis.emotionalDrivers?.length   && `Emotions: ${safeList(analysis.emotionalDrivers, 3)}`,

/* ════════════════════════════════════════════════════════════════════
   HISTORY PAGE
   ════════════════════════════════════════════════════════════════════ */
function HistoryPage() {
  const [history, setHistory] = useState([]);
  const [filter, setFilter]   = useState("All");
  const [search, setSearch]   = useState("");
  const [expanded, setExpanded] = useState(null); // id of expanded card
  const [toast, setToast]     = useState(null);

  useEffect(() => { setHistory(loadHistory()); }, []);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }

  function handleClear() {
    if (!window.confirm("Clear all history? This resets deduplication — concepts can be regenerated.")) return;
    clearHistory();
    setHistory([]);
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => showToast("✓ Copied!")).catch(() => showToast("Copy failed"));
  }

  // Group history by date
  const grouped = useMemo(() => {
    const map = {};
    history.forEach(h => {
      const d = h.date || "Unknown";
      if (!map[d]) map[d] = [];
      map[d].push(h);
    });
    return Object.entries(map).sort(([a], [b]) => b.localeCompare(a));
  }, [history]);

  const filteredGrouped = useMemo(() => {
    if (filter === "All" && !search.trim()) return grouped;
    const q = search.toLowerCase();
    return grouped
      .map(([date, items]) => [
        date,
        items.filter(h => {
          if (filter !== "All" && h.platform !== filter) return false;
          if (q && !h.title?.toLowerCase().includes(q) && !h.hook?.toLowerCase().includes(q) && !h.angle?.toLowerCase().includes(q)) return false;
          return true;
        }),
      ])
      .filter(([, items]) => items.length > 0);
  }, [grouped, filter, search]);

  const totalFiltered = filteredGrouped.reduce((acc, [, items]) => acc + items.length, 0);

  return (
    <div style={{ padding: 28, fontFamily: "'DM Sans', sans-serif", height: "100%", overflowY: "auto" }}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 20, right: 24, zIndex: 9999,
          background: "#10b981", color: "white", padding: "10px 18px",
          borderRadius: 10, fontSize: 13, fontWeight: 700,
          animation: "fadeUp 0.2s ease",
        }}>{toast}</div>
      )}

      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-0.5px", marginBottom: 5, fontFamily: "'Bricolage Grotesque', sans-serif" }}>
            Concept History
          </h1>
          <p style={{ fontSize: 13, color: "#374151" }}>
            All generated concepts · {history.length} total · click any to expand
          </p>
        </div>
        <button onClick={handleClear} style={{
          background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.2)",
          borderRadius: 8, padding: "8px 14px", color: "#f87171",
          fontSize: 12, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0,
        }}>
          🗑 Clear History
        </button>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
        {["All", "Instagram Reel", "TikTok Video"].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{
            padding: "5px 14px", borderRadius: 20, cursor: "pointer",
            border: `1px solid ${filter === f ? "#6366f1" : "#111827"}`,
            background: filter === f ? "rgba(99,102,241,0.12)" : "transparent",
            color: filter === f ? "#818cf8" : "#374151", fontSize: 12,
          }}>
            {f === "All" ? "All" : f === "Instagram Reel" ? "🎬 Instagram" : "🎵 TikTok"}
          </button>
        ))}
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search title, hook, angle…"
          style={{
            flex: 1, minWidth: 160, maxWidth: 260,
            background: "#0a0d1c", border: "1px solid #111827",
            borderRadius: 8, padding: "6px 12px", color: "#f1f5f9", fontSize: 12,
          }}
        />
        <span style={{ fontSize: 12, color: "#374151" }}>{totalFiltered} concepts</span>
      </div>

      {/* History list */}
      {history.length === 0 ? (
        <div style={{ textAlign: "center", padding: 60, color: "#374151" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📭</div>
          No history yet. Generate some concepts first.
        </div>
      ) : filteredGrouped.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: "#374151" }}>No results match your filter.</div>
      ) : (
        filteredGrouped.map(([date, items]) => (
          <div key={date} style={{ marginBottom: 22 }}>
            <div style={{
              fontSize: 11, color: "#374151", fontWeight: 700,
              textTransform: "uppercase", letterSpacing: "0.8px",
              marginBottom: 8, paddingBottom: 6, borderBottom: "1px solid #0e1830",
              display: "flex", alignItems: "center", gap: 8,
            }}>
              {date === todayStr() && (
                <span style={{ color: "#10b981", background: "rgba(16,185,129,0.1)", padding: "1px 7px", borderRadius: 10 }}>Today</span>
              )}
              {niceDate(date)} · {items.length} concepts
            </div>

            {items.map((h, i) => {
              const isIG    = h.platform === "Instagram Reel";
              const color   = isIG ? "#e1306c" : "#69c9d0";
              const isOpen  = expanded === (h.id || `${date}-${i}`);
              const itemId  = h.id || `${date}-${i}`;
              return (
                <div key={itemId} style={{ marginBottom: 6 }}>
                  {/* Collapsed row — clickable */}
                  <div
                    onClick={() => setExpanded(isOpen ? null : itemId)}
                    style={{
                      display: "flex", gap: 10, alignItems: "flex-start",
                      padding: "10px 14px",
                      background: isOpen ? "#0d1428" : "#090d1b",
                      border: `1px solid ${isOpen ? "#1e2d4a" : "#0e1830"}`,
                      borderRadius: isOpen ? "9px 9px 0 0" : 9,
                      cursor: "pointer",
                      transition: "background 0.15s",
                    }}>
                    <Badge color={color}>{isIG ? "🎬" : "🎵"} {h.platform}</Badge>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 600, marginBottom: 2 }}>
                        {h.title}
                      </div>
                      {h.hook && !isOpen && (
                        <div style={{ fontSize: 11, color: "#374151", fontStyle: "italic", fontFamily: "'DM Mono', monospace" }}>
                          "{h.hook.slice(0, 90)}{h.hook.length > 90 ? "…" : ""}"
                        </div>
                      )}
                    </div>
                    {h.angle && !isOpen && <Badge color="#1e2d4a" small>{h.angle}</Badge>}
                    <span style={{ fontSize: 14, color: "#374151", flexShrink: 0, marginLeft: 4 }}>
                      {isOpen ? "▲" : "▼"}
                    </span>
                  </div>

                  {/* Expanded panel */}
                  {isOpen && (
                    <div style={{
                      background: "#0a0f22", border: "1px solid #1e2d4a",
                      borderTop: "none", borderRadius: "0 0 9px 9px",
                      padding: "14px 16px",
                    }}>
                      {/* Hook */}
                      {h.hook && (
                        <div style={{ marginBottom: 12 }}>
                          <div style={{ fontSize: 10, color: "#374151", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 4 }}>Hook</div>
                          <div style={{ fontSize: 13, color: "#fbbf24", fontStyle: "italic", fontFamily: "'DM Mono', monospace", lineHeight: 1.5 }}>
                            "{h.hook}"
                          </div>
                        </div>
                      )}

                      {/* Angle / Format */}
                      <div style={{ display: "flex", gap: 16, marginBottom: 12, flexWrap: "wrap" }}>
                        {h.angle && (
                          <div>
                            <div style={{ fontSize: 10, color: "#374151", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 3 }}>Angle</div>
                            <div style={{ fontSize: 12, color: "#94a3b8" }}>{h.angle}</div>
                          </div>
                        )}
                        {h.format && (
                          <div>
                            <div style={{ fontSize: 10, color: "#374151", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 3 }}>Format</div>
                            <div style={{ fontSize: 12, color: "#94a3b8" }}>{h.format}</div>
                          </div>
                        )}
                        {h.platform && (
                          <div>
                            <div style={{ fontSize: 10, color: "#374151", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 3 }}>Platform</div>
                            <div style={{ fontSize: 12, color: "#94a3b8" }}>{h.platform}</div>
                          </div>
                        )}
                      </div>

                      {/* Scenes if present */}
                      {h.scenes && h.scenes.length > 0 && (
                        <div style={{ marginBottom: 12 }}>
                          <div style={{ fontSize: 10, color: "#374151", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 6 }}>
                            Scenes ({h.scenes.length})
                          </div>
                          {h.scenes.map((sc, si) => (
                            <div key={si} style={{
                              background: "#060912", border: "1px solid #111827",
                              borderRadius: 7, padding: "8px 12px", marginBottom: 5,
                              fontSize: 12, color: "#94a3b8", lineHeight: 1.5,
                            }}>
                              <span style={{ color: "#6366f1", fontWeight: 700, marginRight: 6 }}>
                                {sc.label || `Scene ${si + 1}`}
                              </span>
                              {sc.script}
                            </div>
                          ))}
                        </div>
                      )}

                      {/* Action buttons */}
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
                        <button
                          onClick={() => copyToClipboard([h.title, h.hook && `Hook: "${h.hook}"`, h.angle && `Angle: ${h.angle}`, h.scenes?.map((s,i) => `Scene ${i+1}: ${s.script}`).join("\n")].filter(Boolean).join("\n\n"))}
                          style={{
                            background: "rgba(99,102,241,0.1)", border: "1px solid rgba(99,102,241,0.3)",
                            borderRadius: 7, padding: "7px 14px", color: "#818cf8",
                            fontSize: 12, fontWeight: 600, cursor: "pointer",
                          }}>
                          📋 Copy Concept
                        </button>
                        {h.hook && (
                          <button
                            onClick={() => copyToClipboard(h.hook)}
                            style={{
                              background: "rgba(245,158,11,0.07)", border: "1px solid rgba(245,158,11,0.2)",
                              borderRadius: 7, padding: "7px 14px", color: "#fbbf24",
                              fontSize: 12, fontWeight: 600, cursor: "pointer",
                            }}>
                            🪝 Copy Hook
                          </button>
                        )}
                        {h.scenes && h.scenes.length > 0 && (
                          <button
                            onClick={() => copyToClipboard(h.scenes.map(s => s.script).join("\n\n"))}
                            style={{
                              background: "rgba(16,185,129,0.07)", border: "1px solid rgba(16,185,129,0.2)",
                              borderRadius: 7, padding: "7px 14px", color: "#10b981",
                              fontSize: 12, fontWeight: 600, cursor: "pointer",
                            }}>
                            📝 Copy Script
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

/* ── SETTINGS FIELD COMPONENTS (defined outside SettingsPage to prevent remount) ── */
// IMPORTANT: These MUST be defined outside SettingsPage.
// Defining components inside a parent component body causes React to treat them
// as a new type on every render → unmount/remount → input loses focus on every keystroke.
function SettingField({ label, value, onChange, placeholder, type = "text", mono = false, hint = null }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{
        fontSize: 11, color: "#374151", display: "block",
        marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.6px", fontWeight: 600,
      }}>
        {label}
      </label>
      <input
        type={type} value={value || ""}
        onChange={onChange}
        placeholder={placeholder}
        style={{
          width: "100%", background: "#060912",
          border: "1px solid #111827", borderRadius: 8,
          padding: "9px 12px", color: "#f1f5f9",
          fontSize: 13, fontFamily: mono ? "'DM Mono', monospace" : "inherit",
        }}
      />
      {hint && <div style={{ fontSize: 11, color: "#374151", marginTop: 4 }}>{hint}</div>}
    </div>
  );
}

function SettingTextArea({ label, value, onChange, placeholder, rows = 3 }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{
        fontSize: 11, color: "#374151", display: "block",
        marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.6px", fontWeight: 600,
      }}>
        {label}
      </label>
      <textarea
        rows={rows} value={value || ""}
        onChange={onChange}
        placeholder={placeholder}
        style={{
          width: "100%", background: "#060912",
          border: "1px solid #111827", borderRadius: 8,
          padding: "9px 12px", color: "#f1f5f9",
          fontSize: 13, resize: "vertical", lineHeight: 1.65,
        }}
      />
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   SETTINGS PAGE
   ════════════════════════════════════════════════════════════════════ */
function SettingsPage() {
  const [s, setS]               = useState(() => loadSettings());
  const [tab, setTab]           = useState("ai");
  const [saved, setSaved]       = useState(false);
  const [testing, setTesting]   = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [showKey, setShowKey]       = useState(false);
  const [showPw, setShowPw]     = useState(false);
  const [sbTesting, setSbTesting] = useState(false);
  const [sbResult, setSbResult]   = useState(null);
  const [sbSyncing, setSbSyncing] = useState(false);

  function update(k, v) {
    setS(prev => ({ ...prev, [k]: v }));
    setSaved(false);
    setTestResult(null);
  }

  // Convenience wrappers for SettingField / SettingTextArea
  function F(k, label, placeholder, type = "text", mono = false, hint = null) {
    return (
      <SettingField
        label={label} placeholder={placeholder} type={type} mono={mono} hint={hint}
        value={s[k] || ""} onChange={e => update(k, e.target.value)}
      />
    );
  }
  function TA(k, label, placeholder, rows = 3) {
    return (
      <SettingTextArea
        label={label} placeholder={placeholder} rows={rows}
        value={s[k] || ""} onChange={e => update(k, e.target.value)}
      />
    );
  }

  function save() {
    saveSettings(s);
    setSaved(true);
    setTimeout(() => setSaved(false), 2800);
  }

  async function testKey() {
    if (!s.geminiApiKey || !s.geminiApiKey.trim()) {
      setTestResult({ ok: false, msg: "Enter your API key first." });
      return;
    }
    setTesting(true);
    setTestResult(null);
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${s.geminiApiKey.trim()}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: "Reply with only the word: OK" }] }],
          generationConfig: { maxOutputTokens: 5 }
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
      setTestResult({ ok: true, msg: `✓ Connected! Response: "${reply}"` });
    } catch (e) {

  {

    "title": "short internal title",
    "angle": "hot take",
    "pillar": "Education",
    "hook": "spoken hook sentence max 10 words",
    "hookOnScreen": "3-5 word screen text",
    "script": {
      "hook": "0-3s spoken script",
      "body": "3-45s spoken script only. Short sentences. First person. Specific details. No stage directions.",
      "cta": "45-60s CTA script"
    },
    "visualStyle": "talking head",
    "audioSuggestion": "audio description",
    "hashtags": "#tag1 #tag2 #tag3"
  }
]`;

      const raw    = await callGemini(systemPrompt, userPrompt, 4000);
      const parsed = extractJSONArray(raw);
      if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("No concept returned.");

      const c = parsed[0];
      setPreview({
        id: uid(), platform: "Instagram Reel",
        title: c.title || "Preview Concept",
        angle: c.angle || "hot take",
        pillar: c.pillar || "",
        hook: c.hook || c.script?.hook || "",
        hookOnScreen: c.hookOnScreen || "",
        script: { hook: c.script?.hook || "", body: c.script?.body || "", cta: c.script?.cta || "" },
        visualStyle: c.visualStyle || "talking head",
        audioSuggestion: c.audioSuggestion || "",
        hashtags: c.hashtags || "",
        used: false,
      });

    } catch (err) {
      setPreviewErr(err?.message || "Preview failed. Try again.");
    } finally {
      setPreviewing(false);
    }
  }

  function confirmAndSave() {
    if (!name.trim() || !instructions.trim()) return;

      name:               name.trim(),

/* ════════════════════════════════════════════════════════════════════
   CHARACTERS PAGE — Manage UGC actor characters
   ════════════════════════════════════════════════════════════════════ */
function CharactersPage() {
  const [chars, setChars]         = useState(() => loadCharacters());
  const [showForm, setShowForm]   = useState(false);
  const [editing, setEditing]     = useState(null);
  const [toast, setToast]         = useState(null);
  const [uploading, setUploading]   = useState(false);
  const [importing, setImporting]   = useState(false);
  const [importList, setImportList] = useState(null); // [{avatar_id, avatar_name, gender, ...}]
  const [importErr, setImportErr]   = useState("");

  // Form fields
  const [fName, setFName]         = useState("");
  const [fDesc, setFDesc]         = useState("");
  const [fBase64, setFBase64]     = useState("");
  const [fIsDefault, setFIsDefault] = useState(false);
  const [fHeygenId, setFHeygenId]           = useState("");
  const [fCreatifyId, setFCreatifyId]       = useState("");
  const fileInputRef = useRef(null);

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  }

  async function fetchHeyGenAvatars() {
    const key = loadSettings().heygenApiKey?.trim();
    if (!key) { setImportErr("Add your HeyGen API key in Settings → AI first."); return; }
    setImporting(true);
    setImportErr("");
    setImportList(null);
    try {
      const res  = await fetch("https://api.heygen.com/v2/avatars", { headers: { "X-Api-Key": key } });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.message || "HeyGen API error " + res.status);
      const avatars = data?.data?.avatars || [];
      if (avatars.length === 0) { setImportErr("No avatars found in your HeyGen account."); }
      else setImportList(avatars);
    } catch (e) {
      setImportErr(e.message || "Failed to fetch avatars.");
    } finally {
      setImporting(false);
    }
  }

  function importAvatar(av) {
    // Check if already exists
    const existing = chars.find(c => c.heygenAvatarId === av.avatar_id);
    if (existing) { showToast("Avatar already in your characters.", "error"); return; }
    const newChar = {
      id:             uid(),
      name:           av.avatar_name || av.avatar_id,
      desc:           [av.gender, av.age_range, av.ethnicity, av.style].filter(Boolean).join(", "),
      base64:         av.preview_image_url || "",  // URL not base64, handled in card display
      previewUrl:     av.preview_image_url || "",
      heygenAvatarId: av.avatar_id,
      isDefault:      chars.length === 0,
      createdAt:      new Date().toISOString(),
    };
    const updated = [...chars, newChar];
    saveCharacters(updated);
    setChars(updated);
    showToast("✓ " + newChar.name + " imported!");
  }

  function openAdd() {
    setEditing(null);
    setFName(""); setFDesc(""); setFBase64(""); setFHeygenId(""); setFCreatifyId("");
    setFIsDefault(chars.length === 0);
    setShowForm(true);
  }

  function openEdit(c) {
    setEditing(c);
    setFName(c.name); setFDesc(c.desc || "");
    setFBase64(c.base64 || "");
    setFHeygenId(c.heygenAvatarId || "");
    setFCreatifyId(c.creatifyCreatorId || "");
    setFIsDefault(!!c.isDefault);
    setShowForm(true);
  }

  function cancelForm() { setShowForm(false); setEditing(null); }

  // When user picks a file: read as base64 (sent directly to Veo — no hosting needed)
  function handleImageFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { showToast("Please select an image file.", "error"); return; }
    if (file.size > 10 * 1024 * 1024) { showToast("Image must be under 10 MB.", "error"); return; }
    const reader = new FileReader();
    reader.onload = (ev) => setFBase64(ev.target.result);
    reader.readAsDataURL(file);
  }

  function saveChar() {
    if (!fName.trim()) { showToast("Name is required.", "error"); return; }
    setUploading(true);

    const newChar = {
      id:              editing?.id || uid(),
      name:            fName.trim(),
      desc:            fDesc.trim(),
      base64:          fBase64,
      heygenAvatarId:     fHeygenId.trim(),
      creatifyCreatorId:  fCreatifyId.trim(),
      isDefault:       fIsDefault,
      createdAt:       editing?.createdAt || new Date().toISOString(),
    };

    let updated = editing
      ? chars.map(c => c.id === editing.id ? newChar : c)
      : [...chars, newChar];

    if (fIsDefault) updated = updated.map(c => ({ ...c, isDefault: c.id === newChar.id }));

    saveCharacters(updated);
    setChars(updated);
    showToast(editing ? "Character updated!" : "Character added!");
    setShowForm(false);
    setEditing(null);
    setUploading(false);
  }

  function deleteChar(id) {
    if (!window.confirm("Delete this character?")) return;
    const updated = chars.filter(c => c.id !== id);
    saveCharacters(updated);
    setChars(updated);
    showToast("Character deleted.");
  }

  function setDefault(id) {
    const updated = chars.map(c => ({ ...c, isDefault: c.id === id }));
    saveCharacters(updated);
    setChars(updated);
    showToast("Default character updated.");
  }

  return (
    <div style={{ padding: 28, fontFamily: "'DM Sans', sans-serif", height: "100%", overflowY: "auto" }}>
      {toast && <Toast {...toast} />}

      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 24, gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-0.5px", marginBottom: 5, fontFamily: "'Bricolage Grotesque', sans-serif" }}>
            UGC Characters
          </h1>
          <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>
            Add your Creatify avatars here. Each character needs a Creator ID from <a href="https://app.creatify.ai" target="_blank" rel="noreferrer" style={{ color: "#8b5cf6" }}>app.creatify.ai</a> → AI Avatars.
          </p>
        </div>

/* ════════════════════════════════════════════════════════════════════
   VIDEO JOBS PAGE — Track Veo 3.1 background video generation
   ════════════════════════════════════════════════════════════════════ */
function ElapsedTimer({ createdAt }) {
  const [elapsed, setElapsed] = useState(0);

  useEffect(() => {
    const start = new Date(createdAt).getTime();
    function tick() { setElapsed(Date.now() - start); }
    tick();
    const iv = setInterval(tick, 1000);
    return () => clearInterval(iv);
  }, [createdAt]);

  const secs = Math.floor(elapsed / 1000);
  const mins = Math.floor(secs / 60);
  const s    = secs % 60;
  const label = mins > 0 ? `${mins}m ${String(s).padStart(2,"0")}s` : `${s}s`;

  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
        <Spinner size={10}/>
        <span style={{ fontSize: 11, color: "#8b5cf6" }}>
          🎭 Creatify Aurora rendering… {label} elapsed
        </span>
      </div>
      <div style={{ height: 4, background: "#0e1830", borderRadius: 4, overflow: "hidden", width: "100%", maxWidth: 320 }}>
        <div style={{
          height: "100%", width: "100%",
          background: "linear-gradient(90deg, #8b5cf6, #6366f1)",
          borderRadius: 4,
          animation: "shimmer 1.5s infinite linear",
        }}/>
      </div>
      <div style={{ fontSize: 10, color: "#374151", marginTop: 3 }}>
        Rendering on Creatify's servers — this page can be closed and reopened
      </div>
    </div>
  );
}

function VideoJobsPage() {
  const [jobs, setJobs]       = useState(() => loadVideoJobs());
  const [polling, setPolling] = useState(false);
  const [toast, setToast]     = useState(null);
  const pollRef               = useRef(null);

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3200);
  }

  // On mount: auto-poll any pending jobs
  useEffect(() => {
    const pending = loadVideoJobs().filter(j => j.status === "processing" || j.status === "queued");
    if (pending.length > 0) pollJobs();
    return () => { if (pollRef.current) clearTimeout(pollRef.current); };
  }, []);

  async function pollJobs() {
    const s            = loadSettings();
    const geminiKey    = s.geminiApiKey?.trim();
    const heygenKey    = s.heygenApiKey?.trim();
    const creatifyId   = s.creatifyApiId?.trim();
    const creatifyKey  = s.creatifyApiKey?.trim();

    const currentJobs = loadVideoJobs();
    const pending = currentJobs.filter(j => j.status === "queued" || j.status === "processing");
    if (pending.length === 0) { setJobs(loadVideoJobs()); return; }

    setPolling(true);
    let updated = [...currentJobs];

    for (const job of pending) {
      // ── Creatify ─────────────────────────────────────────────────────────
      if (job.provider === "creatify") {
        if (!creatifyId || !creatifyKey || !job.creatifyJobId) continue;
        try {
          const st = await creatifyGetStatus(job.creatifyJobId, creatifyId, creatifyKey);
          if (st.status === "done" && st.output) {
            updated = updated.map(j => j.id === job.id
              ? { ...j, status: "completed", videoUrl: st.output }
              : j
            );
          } else if (st.status === "failed") {
            const errObj = st.error || st.message || st.detail;
            const reason = typeof errObj === "object" && errObj !== null
              ? (errObj.detail || errObj.message || JSON.stringify(errObj))
              : (errObj || "Creatify did not return a reason.");
            updated = updated.map(j => j.id === job.id
              ? { ...j, status: "failed", error: reason }
              : j
            );
          }
        } catch (e) {
          updated = updated.map(j => j.id === job.id
            ? { ...j, status: "failed", error: `Poll error: ${e.message}` }
            : j
          );
        }

      // ── HeyGen ───────────────────────────────────────────────────────────
      } else if (job.provider === "heygen") {
        if (!heygenKey || !job.heygenVideoId) continue;
        try {
          const st = await heygenGetVideoStatus(job.heygenVideoId, heygenKey);
          if (st.status === "completed" && st.video_url) {
            updated = updated.map(j => j.id === job.id
              ? { ...j, status: "completed", videoUrl: st.video_url }
              : j
            );
          } else if (st.status === "failed") {
            const errObj = st.error || st.error_detail || st.message || st.msg;
            const reason = typeof errObj === "object" && errObj !== null
              ? (errObj.detail || errObj.message || JSON.stringify(errObj))
              : (errObj || "HeyGen did not provide a reason.");
            updated = updated.map(j => j.id === job.id
              ? { ...j, status: "failed", error: reason }
              : j
            );
          }
        } catch (e) {
          updated = updated.map(j => j.id === job.id
            ? { ...j, status: "failed", error: `Poll error: ${e.message}` }
            : j
          );
        }

      // ── Legacy Veo ───────────────────────────────────────────────────────
      } else {
        if (!geminiKey || !job.operationName) continue;
        try {
          const op = await checkVeoOperation(job.operationName, geminiKey);
          if (op.done) {
            const sample = op.response?.generateVideoResponse?.generatedSamples?.[0];
            const vid = sample?.video;
            if (vid?.uri) {
              updated = updated.map(j => j.id === job.id
                ? { ...j, status: "completed", videoFileUri: vid.uri }
                : j
              );
            } else {
              const raw = JSON.stringify(op.response || {}).slice(0, 300);
              updated = updated.map(j => j.id === job.id
                ? { ...j, status: "failed", error: "No video URI in Veo response. " + raw }
                : j
              );
            }
          }
        } catch (e) { console.warn("Veo poll error:", e.message); }
      }
    }
    saveVideoJobs(updated);
    setJobs(updated);
    setPolling(false);
    const stillPending = updated.filter(j => j.status === "queued" || j.status === "processing");
    if (stillPending.length > 0) {
      pollRef.current = setTimeout(pollJobs, 10000);
    }
  }

  function clearJob(id) {
    const updated = jobs.filter(j => j.id !== id);
    saveVideoJobs(updated);
    setJobs(updated);
  }

  function clearCompleted() {
    const updated = jobs.filter(j => j.status !== "completed");
    saveVideoJobs(updated);
    setJobs(updated);
  }

  const pending   = jobs.filter(j => j.status === "queued" || j.status === "processing");
  const completed = jobs.filter(j => j.status === "completed");
  const failed    = jobs.filter(j => j.status === "failed");

  const STATUS_COLORS = { queued: "#f59e0b", processing: "#6366f1", completed: "#10b981", failed: "#ef4444" };
  const STATUS_ICONS  = { queued: "⏳", processing: "⚡", completed: "✓", failed: "✗" };

  return (
    <div style={{ padding: 28, fontFamily: "'DM Sans', sans-serif", height: "100%", overflowY: "auto" }}>
      {toast && <Toast {...toast} />}

      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 22, gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", letterSpacing: "-0.5px", marginBottom: 5, fontFamily: "'Bricolage Grotesque', sans-serif" }}>
            Video Jobs
          </h1>
          <p style={{ fontSize: 13, color: "#374151" }}>
            HeyGen UGC video generation jobs · {jobs.length} total
            {pending.length > 0 && <span style={{ marginLeft: 8, color: "#f59e0b" }}>⚡ {pending.length} rendering</span>}
          </p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={pollJobs}
            disabled={polling}
            style={{
              background: "#0b1020", border: "1px solid #1a2540", borderRadius: 8,
              padding: "8px 14px", color: "#94a3b8", fontSize: 12, cursor: polling ? "not-allowed" : "pointer",
              display: "flex", alignItems: "center", gap: 6,
            }}>
            {polling ? <><Spinner size={12}/> Polling…</> : "🔄 Refresh Status"}
          </button>
          {completed.length > 0 && (
            <button
              onClick={clearCompleted}
              style={{ background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, padding: "8px 14px", color: "#f87171", fontSize: 12, cursor: "pointer" }}>
              🗑 Clear Completed
            </button>
          )}
        </div>
      </div>

      {/* Background generation note */}
      <div style={{
        background: "rgba(99,102,241,0.06)", border: "1px solid rgba(99,102,241,0.18)",
        borderRadius: 10, padding: "12px 16px", marginBottom: 22, fontSize: 12, color: "#6366f1", lineHeight: 1.7,
      }}>
        🌐 <strong>Background generation:</strong> Videos render on HeyGen's servers — they continue generating even when you close this tab.
        Come back here and click "Refresh Status" to pick up completed videos.
      </div>

      {jobs.length === 0 ? (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#374151" }}>
          <div style={{ fontSize: 52, marginBottom: 16 }}>🎬</div>
          <div style={{ fontSize: 15, color: "#4b5563", fontWeight: 700, marginBottom: 8 }}>No video jobs yet</div>
          <div style={{ fontSize: 13, maxWidth: 380, margin: "0 auto", lineHeight: 1.75 }}>
            Generate a concept, expand it, then click "🍌 Generate UGC Video" to start your first Veo 3.1 job.
          </div>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {jobs.map(job => {
            const statusColor = STATUS_COLORS[job.status] || "#374151";
            const statusIcon  = STATUS_ICONS[job.status]  || "?";
            return (
              <div
                key={job.id}
                style={{
                  background: "#090d1b", border: "1px solid #0e1830",
                  borderRadius: 12, padding: "16px 18px",
                  display: "flex", gap: 16, alignItems: "flex-start",
                  animation: "fadeUp 0.2s ease",
                }}>
                {/* Thumb */}
                <div style={{
                  width: 72, height: 72, borderRadius: 10, flexShrink: 0,
                  background: "#0a0d1c", border: "1px solid #1a2540",
                  overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  {job.thumbUrl
                    ? <img src={job.thumbUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }}/>
                    : <span style={{ fontSize: 28 }}>🎬</span>
                  }
                </div>

                {/* Info */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#f1f5f9" }}>{job.title}</div>
                    <span style={{
                      fontSize: 10, fontWeight: 700, color: statusColor,
                      background: `${statusColor}15`, border: `1px solid ${statusColor}30`,
                      padding: "1px 8px", borderRadius: 20,

                    }}>

                  </div>
                  <div style={{ fontSize: 11, color: "#374151", marginBottom: 6 }}>
                    Character: <span style={{ color: "#64748b" }}>{job.charName}</span>
                    {" · "}{new Date(job.createdAt).toLocaleString()}
                  </div>
                  {(job.status === "queued" || job.status === "processing") && (

                  {job.status === "completed" && (job.videoUrl || job.videoFileUri) && (
                    <div style={{ marginTop: 6 }}>
                      {job.provider === "heygen" && (
                        <div style={{ fontSize: 10, color: "#64748b", marginBottom: 6 }}>
                          ⏱ HeyGen links expire in 7 days — download to keep
                        </div>
                      )}
                      <div style={{ display: "flex", gap: 8 }}>
                        <button
                          onClick={async () => {
                            try {
                              if (job.videoUrl) {
                                window.open(job.videoUrl, "_blank");
                              } else {
                                const key = loadSettings().geminiApiKey?.trim();
                                const blobUrl = await fetchVeoVideoBlob(job.videoFileUri, key);
                                window.open(blobUrl, "_blank");
                              }

                          style={{
                            background: "linear-gradient(135deg,#10b981,#059669)",
                            border: "none", borderRadius: 7, padding: "6px 14px",
                            color: "white", fontSize: 12, fontWeight: 700,
                            cursor: "pointer",
                            display: "inline-flex", alignItems: "center", gap: 5,
                            boxShadow: "0 3px 10px rgba(16,185,129,.3)",
