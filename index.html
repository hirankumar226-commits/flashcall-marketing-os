                        <button
                          onClick={async () => {
                            try {
                              let url = job.videoUrl;
                              if (!url) {
                                const key = loadSettings().geminiApiKey?.trim();
                                url = await fetchVeoVideoBlob(job.videoFileUri, key);
                              }
                              const a = document.createElement("a");
                              a.href = url;
                              a.download = (job.title || "ugc-video") + ".mp4";
                              a.target = "_blank";
                              a.click();
                            } catch (e) { alert("Download failed: " + e.message); }
                          }}
                          style={{
                            background: "#0b1020", border: "1px solid #1a2540", borderRadius: 7, padding: "6px 14px",
                            color: "#94a3b8", fontSize: 12, fontWeight: 600,
                            cursor: "pointer",
                            display: "inline-flex", alignItems: "center", gap: 5,
                          }}>
                          ⬇ Download
                        </button>
                      </div>
                    </div>
                  )}
                  {job.status === "failed" && (
                    <div style={{
                      marginTop: 8,
                      background: "rgba(239,68,68,0.07)",
                      border: "1px solid rgba(239,68,68,0.25)",
                      borderRadius: 8, padding: "9px 12px",
                    }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#ef4444", marginBottom: 4 }}>
                        ✗ Generation Failed
                      </div>
                      <div style={{
                        fontSize: 11, color: "#fca5a5", lineHeight: 1.6,
                        fontFamily: "'DM Mono', monospace", wordBreak: "break-word",
                      }}>
                        {(() => {
                          const e = job.error;
                          if (!e) return "HeyGen did not return a reason.";
                          if (typeof e === "string") return e;
                          return e.detail || e.message || JSON.stringify(e);
                        })()}
                      </div>
                      <button
                        onClick={() => {
                          const e = job.error;
                          const txt = !e ? "" : typeof e === "string" ? e : (e.detail || e.message || JSON.stringify(e));
                          navigator.clipboard?.writeText(txt);
                        }}
                        style={{
                          marginTop: 6, background: "rgba(239,68,68,0.1)",
                          border: "1px solid rgba(239,68,68,0.2)", borderRadius: 5,
                          padding: "3px 10px", fontSize: 10, color: "#f87171",
                          cursor: "pointer",
                        }}>
                        📋 Copy error
                      </button>
                    </div>
                  )}
                </div>

                {/* Remove */}
                <button
                  onClick={() => clearJob(job.id)}
                  style={{ background: "none", border: "none", color: "#374151", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>
                  ×
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   AD STUDIO PAGE — Viral video cloning for Flashcall UGC ads
   ════════════════════════════════════════════════════════════════════ */
function AdStudioPage() {
  const [step, setStep]               = useState("setup");
  const [videoUrl, setVideoUrl]       = useState("");
  const [frames, setFrames]           = useState([]);
  const [analysis, setAnalysis]       = useState(null);
  const [creatorDesc, setCreatorDesc] = useState("");
  const [generatedImage, setGeneratedImage] = useState(null);
  const [script, setScript]           = useState(null);
  const [error, setError]             = useState("");
  const [loadingMsg, setLoadingMsg]   = useState("");
  const [loadingTick, setLoadingTick] = useState(0);
  const [copied, setCopied]           = useState("");
  const [provider, setProvider]       = useState("gemini"); // "gemini" | "openai"
  const tickerRef = useRef(null);

  const settings  = loadSettings();
  const apiKey    = settings.geminiApiKey?.trim() || "";
  const openaiKey = settings.openaiApiKey?.trim() || "";
  const MODEL     = "gemini-2.5-flash";
  const activeKey = provider === "claude" ? (settings.claudeApiKey?.trim() || "") : apiKey;

  const fetchWithTimeout = (url, opts, ms) => {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms || 30000);
    return fetch(url, Object.assign({}, opts, { signal: ctrl.signal })).finally(() => clearTimeout(t));
  };

  useEffect(() => {
    if (step === "analyzing" || step === "generating") {
      setLoadingTick(0);
      tickerRef.current = setInterval(() => setLoadingTick(t => Math.min(t + 1, 3)), 4000);
    }
    return () => clearInterval(tickerRef.current);
  }, [step]);

  const extractVideoId = (url) => {
    const pats = [/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/, /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/, /youtu\.be\/([a-zA-Z0-9_-]{11})/];
    for (const p of pats) { const m = url.match(p); if (m) return m[1]; }
    return null;
  };

  const toBase64 = async (imgUrl) => {
    try {
      const res = await fetchWithTimeout(imgUrl, {}, 15000);
      if (!res.ok) return null;
      const blob = await res.blob();
      return await new Promise(r2 => { const r = new FileReader(); r.onload = () => r2(r.result.split(",")[1]); r.readAsDataURL(blob); });
    } catch (_) { return null; }
  };

  const callGemini = async (body) => {
    const res = await fetchWithTimeout(
      "https://generativelanguage.googleapis.com/v1beta/models/" + MODEL + ":generateContent?key=" + apiKey,
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) },
      60000
    );
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    if (!d.candidates || !d.candidates[0] || !d.candidates[0].content || !d.candidates[0].content.parts || !d.candidates[0].content.parts[0]) throw new Error("Empty response from Gemini");
    return { text: d.candidates[0].content.parts[0].text };
  };

  const callOpenAI = async (messages) => {
    const res = await fetchWithTimeout(
      "https://api.openai.com/v1/chat/completions",
      { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + openaiKey },
        body: JSON.stringify({ model: "gpt-4o", messages, response_format: { type: "json_object" } }) },
      60000
    );
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    if (!d.choices || !d.choices[0]) throw new Error("Empty response from OpenAI");
    return { text: d.choices[0].message.content };
  };

  // Unified call — routes to whichever provider is selected
  const aiCall = async (textPrompt, imageParts) => {
    if (provider === "openai") {
      const contentParts = (imageParts || []).map(p => ({
        type: "image_url",
        image_url: { url: "data:image/jpeg;base64," + p.inline_data.data }
      }));
      contentParts.push({ type: "text", text: textPrompt });
      return await callOpenAI([{ role: "user", content: contentParts }]);
    } else if (provider === "claude") {
      // Claude vision: images as base64
      const claudeKey = settings.claudeApiKey?.trim() || "";
      if (!claudeKey) throw new Error("No Claude API key — add it in Settings first.");
      const msgParts = (imageParts || []).map(p => ({
        type: "image",
        source: { type: "base64", media_type: "image/jpeg", data: p.inline_data.data }
      }));
      msgParts.push({ type: "text", text: textPrompt });
      const res = await fetchWithTimeout("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": claudeKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 4096, messages: [{ role: "user", content: msgParts }] })
      }, 60000);
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      return { text: d.content?.[0]?.text || "" };
    } else {
      const parts = (imageParts || []).map(p => p);
      parts.push({ text: textPrompt });
      const body = { contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } };
      return await callGemini(body);
    }
  };

  const analyzeVideo = async () => {
    setError("");
    if (!activeKey) return setError("No " + (provider === "claude" ? "Claude" : "Gemini") + " API key — add it in Settings first.");
    if (!videoUrl.trim()) return setError("Paste a YouTube URL first.");
    const vid = extractVideoId(videoUrl.trim());
    if (!vid) return setError("Could not read the video ID — check it is a valid YouTube URL.");
    setStep("analyzing");
    setLoadingMsg("Grabbing 4 frames...");
    try {
      const frameUrls = [
        "https://img.youtube.com/vi/" + vid + "/maxresdefault.jpg",
        "https://img.youtube.com/vi/" + vid + "/1.jpg",
        "https://img.youtube.com/vi/" + vid + "/2.jpg",
        "https://img.youtube.com/vi/" + vid + "/3.jpg",
      ];
      let title = "";
      try {
        const tr = await fetchWithTimeout("https://www.youtube.com/oembed?url=" + encodeURIComponent(videoUrl.trim()) + "&format=json", {}, 8000);
        if (tr.ok) { const td = await tr.json(); title = td.title || ""; }
      } catch (_) {}
      const b64s = await Promise.all(frameUrls.map(toBase64));
      const valid = frameUrls.map((u, i) => ({ u, b: b64s[i] })).filter(f => f.b);
      if (!valid.length) throw new Error("Could not fetch any frames — is this a public YouTube video?");
      setFrames(valid.map(f => ({ preview: "data:image/jpeg;base64," + f.b })));
      setLoadingMsg("Sending " + valid.length + " frames to Gemini Vision...");
      const titleBit = title ? " titled \"" + title + "\"" : "";
      const prompt = "You are a UGC creative director. I have " + valid.length + " frame grabs from a viral video" + titleBit + " (thumbnail, early, middle, late). Extract the complete visual DNA to recreate it for Flashcall — a platform that helps creators monetize their followers through personal 1:1 paid calls. Return ONLY valid JSON with these exact keys: scene, background_details, activity, lighting, camera_angle, color_grade, energy, hook_style, script_structure, pacing, creator_look, key_props, scene_image_prompt. For scene_image_prompt write a detailed image generation prompt that recreates the EXACT scene. Critical style rules for scene_image_prompt: shot on iPhone front camera, slightly soft focus, natural ambient room lighting only, casual handheld framing, slightly imperfect composition, ordinary lived-in home environment, unedited raw look, vertical 9:16. Do NOT use words like photorealistic, professional, studio, high quality, sharp, polished or cinematic. It must look like a real unedited TikTok or Instagram Reel self-recording, not a photoshoot.";
      const imageParts = valid.map(f => ({ inline_data: { mime_type: "image/jpeg", data: f.b } }));
      const result = await aiCall(prompt, imageParts);
      const parsed = JSON.parse(result.text.replace(/```json|```/g, "").trim());
      setAnalysis(parsed);
      setStep("dna");
    } catch (err) {
      setError("Analysis failed: " + err.message);
      setStep("setup");
    }
  };

  const generateBrief = async () => {
    setError("");
    // creatorDesc is optional — skip means Imagen uses the scene prompt alone
    setStep("generating");
    setGeneratedImage(null);
    try {
      setLoadingMsg("Placing your creator in the exact scene...");
      const imgPrompt = (analysis.scene_image_prompt || "") + ". The person looks exactly like this — match precisely: " + creatorDesc + ". Do not change their ethnicity, skin tone, age, hair color or face under any circumstances. Technical style: low-quality smartphone selfie video still, front-facing camera, heavy digital noise and grain, motion blur, overexposed or underexposed depending on room light, washed out colors, compression artifacts, flat uneven room lighting, no bokeh, no depth of field, background is fully in focus and messy, lens distortion, 720p quality feel, looks like a WhatsApp video call screenshot or a paused TikTok recording. NOT a photoshoot. NOT professional. NOT sharp. NOT cinematic. Raw and ugly like a real self-recorded video.";
      let imgSrc = null;
      let imgErr = null;
      try {
        const r = await fetchWithTimeout(
          "https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=" + apiKey,
          { method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ instances: [{ prompt: imgPrompt }], parameters: { sampleCount: 1, aspectRatio: "9:16", personGeneration: "allow_adult" } }) },
          30000
        );
        const d = await r.json();
        if (d.predictions && d.predictions[0] && d.predictions[0].bytesBase64Encoded) {
          imgSrc = "data:image/png;base64," + d.predictions[0].bytesBase64Encoded;
        } else { imgErr = (d.error && d.error.message) || "No image returned"; }
      } catch (e) { imgErr = e.name === "AbortError" ? "Imagen timed out (30s)" : e.message; }
      if (!imgSrc) {
        try {
          setLoadingMsg("Trying backup image generator...");
          const polUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(imgPrompt) + "?width=540&height=960&nologo=true&model=flux&seed=" + Date.now() + "&nofeed=true";
          const pr = await fetchWithTimeout(polUrl, {}, 30000);
          if (pr.ok) {
            const blob = await pr.blob();
            imgSrc = await new Promise(res => { const rd = new FileReader(); rd.onload = () => res(rd.result); rd.readAsDataURL(blob); });
          } else { imgErr = "Pollinations: HTTP " + pr.status; }
        } catch (e) { imgErr = e.name === "AbortError" ? "Image timed out (30s)" : e.message; }
      }
      setGeneratedImage(imgSrc || null);
      if (!imgSrc) setError("Image failed (" + imgErr + ") — script is still ready below.");
      setLoadingMsg("Writing the Flashcall script...");
      const sp = "You are a top UGC scriptwriter for Flashcall — a platform that lets creators monetize their followers through personal 1:1 paid calls. This ad targets CREATORS, not fans. The person in the video is speaking to other creators who have followers and want to earn from them. Reference DNA — Activity: " + (analysis.activity||"") + ". Scene: " + (analysis.scene||"") + ". Energy: " + (analysis.energy||"") + ". Hook style: " + (analysis.hook_style||"") + ". Pacing: " + (analysis.pacing||"") + ". Write a 60-second UGC ad script where the creator shares how Flashcall helped them monetize their followers through 1:1 calls. Hook must grab a creator who has followers but is not monetizing them yet. Feel real, unscripted, peer-to-peer — like one creator talking to another. Never say audience — always say followers. Return ONLY valid JSON with keys: hook, full_script, text_overlays (array of 4), caption, cta.";
      const sr = await aiCall(sp, []);
      const ps = JSON.parse(sr.text.replace(/```json|```/g, "").trim());
      setScript(ps);
      setStep("brief");
    } catch (err) {
      setError("Generation failed: " + err.message);
      setStep("dna");
    }
  };

  const copyText = (text, key) => {
    navigator.clipboard && navigator.clipboard.writeText(text);
    setCopied(key);
    setTimeout(() => setCopied(""), 2000);
  };

  const S = {
    input: { width:"100%", boxSizing:"border-box", background:"#060912", border:"1px solid #111827", borderRadius:10, padding:"12px 14px", color:"#f1f5f9", fontSize:14, outline:"none", fontFamily:"'DM Sans',sans-serif" },
    card:  { background:"#08090f", border:"1px solid #0c1428", borderRadius:16, padding:"22px 24px" },
    pill:  (c) => ({ display:"inline-flex", alignItems:"center", gap:6, background:c+"12", border:"1px solid "+c+"25", borderRadius:100, padding:"4px 12px", color:c, fontSize:10, fontWeight:600, letterSpacing:"0.1em" }),
    btnP:  { background:"linear-gradient(135deg,#ff1f6a,#bf1550)", border:"none", borderRadius:10, padding:"12px 20px", color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", width:"100%", boxShadow:"0 4px 20px rgba(255,31,106,0.25)" },
    btnG:  { background:"#08090f", border:"1px solid #0c1428", borderRadius:8, padding:"8px 14px", color:"#4b5563", fontSize:12, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" },
  };

  if (step === "setup") return (
    <div style={{ minHeight:"100vh", padding:"48px 32px", maxWidth:540, margin:"0 auto" }}>
      <div style={{ ...S.pill("#ff1f6a"), marginBottom:18 }}>
        <span style={{ width:6, height:6, background:"#ff1f6a", borderRadius:"50%", display:"inline-block", animation:"pulse 2s infinite" }}/>
        AD STUDIO — BETA
      </div>
      <h1 style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:32, fontWeight:800, color:"#f1f5f9", margin:"0 0 10px", letterSpacing:"-0.5px" }}>
        Clone any viral reel.<br/><span style={{ color:"#ff1f6a" }}>Make it Flashcall.</span>
      </h1>
      <p style={{ color:"#374151", fontSize:14, lineHeight:1.7, margin:"0 0 28px" }}>
        Paste a YouTube URL — we grab 4 frames automatically and send them to Gemini Vision. Full visual DNA extracted, no manual steps.
      </p>
      {provider === "gemini" && !apiKey && <div style={{ background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:10, padding:"10px 14px", color:"#f59e0b", fontSize:13, marginBottom:16 }}>No Gemini key — add it in <strong>Settings</strong> first.</div>}
      
      {provider === "claude" && !settings.claudeApiKey?.trim() && <div style={{ background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:10, padding:"10px 14px", color:"#f59e0b", fontSize:13, marginBottom:16 }}>No Claude key — add it in <strong>Settings</strong> first.</div>}
      <div style={{ display:"flex", gap:8, marginBottom:20 }}>
        {[["gemini","✦ Gemini 2.5 Flash","#ff1f6a"],["claude","🟡 Claude Haiku","#f59e0b"]].map(([id,label,col]) => (
          <button key={id} onClick={() => setProvider(id)} style={{ flex:1, padding:"10px 14px", borderRadius:10, border:"1px solid "+(provider===id ? col+"60" : "#0c1428"), background:provider===id ? col+"10" : "#06080f", color:provider===id ? col : "#374151", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", transition:"all 0.2s" }}>
            {label}
          </button>
        ))}
      </div>
      <div style={S.card}>
        <label style={{ fontSize:10, color:"#374151", display:"block", marginBottom:8, textTransform:"uppercase", letterSpacing:"1px" }}>YouTube / YouTube Shorts URL</label>
        <input type="url" placeholder="https://www.youtube.com/shorts/..." value={videoUrl}
          onChange={e => { setVideoUrl(e.target.value); setError(""); }}
          onKeyDown={e => e.key==="Enter" && analyzeVideo()}
          style={S.input}/>
        <p style={{ color:"#1e2d4a", fontSize:11, margin:"8px 0 20px" }}>Works with Shorts, regular YouTube and youtu.be links. Grabs 4 frames automatically.</p>
        {error && <div style={{ background:"rgba(239,68,68,0.07)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:8, padding:"10px 14px", color:"#f87171", fontSize:13, marginBottom:16 }}>{error}</div>}
        <button onClick={analyzeVideo} disabled={!apiKey} style={{ ...S.btnP, opacity:apiKey?1:0.4, cursor:apiKey?"pointer":"not-allowed" }}>Analyze Video →</button>
      </div>
      <div style={{ marginTop:24, display:"flex", flexDirection:"column", gap:8 }}>
        {[["01","Paste any YouTube URL","Shorts, regular videos, youtu.be — all work"],["02","4 frames grabbed automatically","Thumbnail + 3 time-coded frames across the whole video"],["03","Gemini reads all 4 frames","Scene, background, activity, lighting, pacing — full DNA"],["04","Your creator, exact same scene","Placed in the same world with a Flashcall script"]].map(([n,t,d]) => (
          <div key={n} style={{ display:"flex", gap:14, padding:"10px 14px", background:"#06080f", border:"1px solid #0c1428", borderRadius:10 }}>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:"#1e3060", fontWeight:700, flexShrink:0, marginTop:2 }}>{n}</span>
            <div><div style={{ fontSize:13, fontWeight:600, color:"#94a3b8", marginBottom:2 }}>{t}</div><div style={{ fontSize:11, color:"#374151" }}>{d}</div></div>
          </div>
        ))}
      </div>
    </div>
  );

  if (step === "analyzing" || step === "generating") {
    const ls = step==="analyzing"
      ? ["Fetching 4 frames from YouTube","Sending to Gemini Vision","Extracting visual DNA","Building scene map"]
      : ["Building scene prompt","Generating creator image","Writing Flashcall script","Assembling brief"];
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
        <div style={{ width:"100%", maxWidth:360, textAlign:"center" }}>
          <div style={{ width:64, height:64, margin:"0 auto 28px", position:"relative" }}>
            <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:"2px solid rgba(255,31,106,0.15)", borderTopColor:"#ff1f6a", animation:"spin 0.9s linear infinite" }}/>
            <div style={{ position:"absolute", inset:12, borderRadius:"50%", border:"2px solid rgba(99,102,241,0.1)", borderBottomColor:"#6366f1", animation:"spin 1.6s linear infinite" }}/>
          </div>
          <h2 style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:20, fontWeight:800, color:"#f1f5f9", margin:"0 0 8px" }}>{step==="analyzing"?"Reading the video":"Building your ad"}</h2>
          <p style={{ color:"#374151", fontSize:13, margin:"0 0 28px" }}>{loadingMsg}</p>
          <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
            {ls.map((s,i) => {
              const done=i<loadingTick, act=i===loadingTick;
              return (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:10, background:done?"rgba(16,185,129,0.06)":act?"rgba(255,31,106,0.06)":"#06080f", border:"1px solid "+(done?"rgba(16,185,129,0.2)":act?"rgba(255,31,106,0.2)":"#0c1428"), borderRadius:9, padding:"9px 14px" }}>
                  <div style={{ width:18, height:18, borderRadius:"50%", flexShrink:0, background:done?"#10b981":"transparent", border:done?"none":"1px solid "+(act?"#ff1f6a":"#1a2540"), display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:"#fff" }}>
                    {done?"✓":act?<span style={{ width:5, height:5, borderRadius:"50%", background:"#ff1f6a", display:"block", animation:"pulse 1s infinite" }}/>:null}
                  </div>
                  <span style={{ color:done?"#10b981":act?"#f1f5f9":"#374151", fontSize:12, textAlign:"left" }}>{s}</span>
                </div>
              );
            })}
          </div>
          {frames.length>0 && <div style={{ marginTop:24, display:"flex", gap:6, justifyContent:"center" }}>{frames.map((f,i) => <div key={i} style={{ width:56, aspectRatio:"9/16", borderRadius:6, overflow:"hidden", border:"1px solid #0c1428" }}><img src={f.preview} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/></div>)}</div>}
        </div>
      </div>
    );
  }

  if (step === "dna" && analysis) {
    const items = [["🎬","Scene",analysis.scene],["🖼️","Background",analysis.background_details],["🎯","Activity",analysis.activity],["💡","Lighting",analysis.lighting],["📷","Camera",analysis.camera_angle],["🎨","Color",analysis.color_grade],["⚡","Energy",analysis.energy],["🪝","Hook",analysis.hook_style],["✂️","Pacing",analysis.pacing],["👗","Look",analysis.creator_look]];
    return (
      <div style={{ padding:"40px 32px", maxWidth:820, margin:"0 auto" }}>
        <div style={{ ...S.pill("#10b981"), marginBottom:14 }}>✓ VISUAL DNA EXTRACTED</div>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
          <h2 style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:26, fontWeight:800, color:"#f1f5f9", margin:0 }}>Got everything from the video</h2>
          <span style={{ fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:100, background:provider==="openai"?"rgba(16,185,129,0.1)":"rgba(255,31,106,0.1)", color:provider==="openai"?"#10b981":"#ff1f6a", border:"1px solid "+(provider==="openai"?"rgba(16,185,129,0.2)":"rgba(255,31,106,0.2)") }}>{provider==="openai"?"GPT-4o":provider==="claude"?"Claude Haiku":"Gemini 2.5"}</span>
        </div>

/* ════════════════════════════════════════════════════════════════════

function LoginScreen({ onAuth }) {
  const [pw, setPw]           = useState("");
  const [err, setErr]         = useState(false);
  const [shaking, setShaking] = useState(false);
  const inputRef              = useRef(null);

  // Auto-focus the password field
  useEffect(() => {
    const t = setTimeout(() => inputRef.current?.focus(), 80);
    return () => clearTimeout(t);
  }, []);

  function attempt() {
    const correct = getCorrectPassword();
    if (pw === correct) {
      lsSet(K_AUTH, "1");
      onAuth();
    } else {
      setErr(true);
      setShaking(true);
      setPw("");
      setTimeout(() => setShaking(false), 500);
      setTimeout(() => inputRef.current?.focus(), 20);
    }
  }

  function handleKeyDown(e) {
    if (e.key === "Enter") attempt();
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "#04060e",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Bricolage Grotesque', 'DM Sans', sans-serif",
      padding: "20px",
    }}>
      <style>{`
        @keyframes loginShake {
          0%,100%{transform:translateX(0)}
          20%,60%{transform:translateX(-10px)}
          40%,80%{transform:translateX(10px)}
        }
      `}</style>

      <div style={{
        width: "100%", maxWidth: 360,
        animation: shaking ? "loginShake 0.45s ease" : "none",
      }}>
        {/* Logo block */}
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{
            width: 64, height: 64, borderRadius: 18,
            margin: "0 auto 18px",
            background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 28, animation: "glow 3s ease infinite",
            boxShadow: "0 0 40px rgba(99,102,241,0.4)",
          }}>
            ⚡
          </div>
          <h1 style={{
            fontSize: 26, fontWeight: 800, color: "#f1f5f9",
            letterSpacing: "-0.6px", marginBottom: 7,
          }}>
            Flashcall Reel OS
          </h1>
          <p style={{ fontSize: 13, color: "#374151", lineHeight: 1.5 }}>
            Instagram Reels + TikTok · 10 concepts/day<br/>
            <span style={{ color: "#1e2d4a" }}>Team access only</span>
          </p>
        </div>

        {/* Card */}
        <div style={{
          background: "#08090f",
          border: "1px solid #0c1428",
          borderRadius: 18, padding: 28,
          boxShadow: "0 24px 80px rgba(0,0,0,0.6)",
        }}>
          <label style={{
            fontSize: 10, color: "#374151", display: "block",
            marginBottom: 8, textTransform: "uppercase", letterSpacing: "1px",
          }}>
            Password
          </label>
          <input
            ref={inputRef}
            type="password"
            value={pw}
            onChange={e => { setPw(e.target.value); setErr(false); }}
            onKeyDown={handleKeyDown}
            placeholder="Enter team password"
            style={{
              width: "100%", background: "#060912",
              border: `1px solid ${err ? "#ef4444" : "#111827"}`,
              borderRadius: 10, padding: "12px 14px",
              color: "#f1f5f9", fontSize: 14,
              fontFamily: "'DM Mono', monospace",
              marginBottom: err ? 8 : 20,
              transition: "border-color 0.2s",
            }}
          />
          {err && (
            <div style={{
              fontSize: 12, color: "#ef4444",
              marginBottom: 16, display: "flex", alignItems: "center", gap: 5,
            }}>
              <span>✗</span> Incorrect password. Please try again.
            </div>
          )}
          <button
            onClick={attempt}
            style={{
              width: "100%",
              background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
              border: "none", borderRadius: 10,
              padding: "13px", color: "white",
              fontSize: 14, fontWeight: 700,
              cursor: "pointer",
              boxShadow: "0 4px 20px rgba(99,102,241,0.4)",
              letterSpacing: "-0.2px",
              transition: "opacity 0.15s",
            }}>
            Enter →
          </button>
        </div>

        <p style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: "#1a2540" }}>
          Flashcall internal tool · not for public distribution
        </p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   ROOT APP — Authentication gate
   ════════════════════════════════════════════════════════════════════ */
function App() {
  const [authed,  setAuthed]  = useState(() => lsGet(K_AUTH, null) === "1");
  const [syncing, setSyncing] = useState(false);

  // On mount: if already authed (returning user), quietly re-sync in background
  useEffect(() => {
    if (authed) { syncFromSupabase(); }
  }, []);

  async function handleAuth() {
    lsSet(K_AUTH, "1");
    setSyncing(true);
    // Pull all settings + data from Supabase so team members don't need to configure anything
    await syncFromSupabase();
    setSyncing(false);
    setAuthed(true);
  }

  function handleLogout() {
    lsSet(K_AUTH, null);
    setAuthed(false);
  }

  if (!authed && !syncing) return <LoginScreen onAuth={handleAuth} />;
  if (syncing) return (
    <div style={{
      minHeight: "100vh", background: "#04060e",
      display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      fontFamily: "'DM Sans', sans-serif", gap: 20,
    }}>
      <div style={{
        width: 56, height: 56, borderRadius: 16,
        background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 26, boxShadow: "0 0 40px rgba(99,102,241,0.4)",
        animation: "glow 3s ease infinite",
      }}>⚡</div>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: "#f1f5f9", marginBottom: 6 }}>
          Loading your workspace…
        </div>
        <div style={{ fontSize: 12, color: "#374151" }}>Syncing settings from Supabase</div>
      </div>
      <div style={{
        width: 180, height: 3, background: "#0c1428", borderRadius: 3, overflow: "hidden",
      }}>
        <div style={{
          height: "100%", borderRadius: 3,
          background: "linear-gradient(90deg, #6366f1, #8b5cf6)",
          animation: "progressFill 1.8s ease infinite",
        }}/>
      </div>
    </div>
  );
  return <MainApp onLogout={handleLogout} />;
}

   ─────────────────────────────────────────────────────────────────── */
const rootEl = document.getElementById("root");
if (!rootEl) throw new Error("No #root element found in DOM.");
const appRoot = ReactDOM.createRoot(rootEl);
appRoot.render(<App />);
</script>
